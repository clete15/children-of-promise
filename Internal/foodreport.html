<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Food Program Report – Children Of Promise</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        body { background: linear-gradient(to right, #5585e0 0%, #2563eb 10%, #1e3a8a 100%); min-height: 100vh; }
        .report-wrap { max-width: 800px; margin: 24px auto; padding: 0 24px; }
        .report-paper {
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.18);
            padding: 32px 36px;
        }
        .report-header { text-align: center; margin-bottom: 24px; }
        .report-header h2 { font-size: 1.1rem; font-weight: 800; color: var(--text); margin-bottom: 4px; }
        .report-header p { font-size: 0.78rem; color: var(--text-muted); }
        .print-btn {
            display: inline-block;
            padding: 10px 28px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 0.88rem;
            font-weight: 700;
            cursor: pointer;
            margin-bottom: 20px;
            transition: background 0.15s;
        }
        .print-btn:hover { background: var(--primary-dark); }
        .food-table { width: 100%; border-collapse: collapse; font-size: 0.82rem; }
        .food-table thead tr { background: #f8fafc; border-bottom: 2px solid var(--border); }
        .food-table th {
            padding: 10px 12px;
            text-align: left;
            font-size: 0.68rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: var(--text-muted);
        }
        .food-table td { padding: 8px 12px; border-bottom: 1px solid var(--border); }
        .food-table tbody tr:last-child td { border-bottom: none; }
        .room-group td { background: #eff6ff; font-weight: 700; color: var(--primary); font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; padding: 10px 12px; }
        .badge-free { background: #dcfce7; color: #166534; padding: 2px 8px; border-radius: 10px; font-weight: 700; font-size: 0.72rem; }
        .badge-reduced { background: #fef3c7; color: #92400e; padding: 2px 8px; border-radius: 10px; font-weight: 700; font-size: 0.72rem; }
        .badge-paid { background: #f1f5f9; color: var(--text-muted); padding: 2px 8px; border-radius: 10px; font-weight: 700; font-size: 0.72rem; }
        @media print {
            body { background: white !important; }
            .site-header, .print-btn, .header-back { display: none !important; }
            .report-wrap { margin: 0; padding: 0; max-width: 100%; }
            .report-paper { box-shadow: none; border-radius: 0; padding: 16px; }
        }
    </style>
</head>
<body>

<header class="site-header">
    <a class="brand-link" href="index.html">
        <img src="ChildrenOfPromise.png" alt="Children Of Promise">
        <div class="brand-text">
            <h1>Children Of Promise</h1>
            <p>Food Program Report &nbsp;·&nbsp; Millstadt, IL</p>
        </div>
    </a>
    <a class="header-back" href="reports.html">← Reports</a>
</header>

<div class="report-wrap">
    <div class="report-paper">
        <div class="report-header">
            <h2>Food Program Report</h2>
            <p>Children Of Promise Christian Dayschool — Active Students</p>
        </div>
        <button class="print-btn" onclick="window.print()">🖨️ Print Report</button>
        <table class="food-table">
            <thead>
                <tr>
                    <th>Student</th>
                    <th>Room</th>
                    <th>Household Income</th>
                    <th>Household Size</th>
                    <th>Food Program</th>
                    <th>Save</th>
                </tr>
            </thead>
            <tbody id="foodBody">
                <tr><td colspan="5" style="text-align:center;padding:32px;color:var(--text-muted);">Loading…</td></tr>
            </tbody>
        </table>
    </div>
</div>

<script>
const AUTH = 'Basic ' + btoa(':cofpadmin');

async function load() {
    try {
        const res = await fetch('/api/students', { headers: { 'Authorization': AUTH } });
        const students = await res.json();
        const active = students.filter(s => s.Active === 'Yes' || s.Active === 'YES');

        // Group by room
        const rooms = {};
        active.forEach(s => {
            const room = s.Room || 'Unknown';
            if (!rooms[room]) rooms[room] = [];
            rooms[room].push(s);
        });

        const tbody = document.getElementById('foodBody');
        let html = '';
        for (const [room, students] of Object.entries(rooms)) {
            html += `<tr class="room-group"><td colspan="5">${room}</td></tr>`;
            students.sort((a, b) => a.Last_Name.localeCompare(b.Last_Name));
            students.forEach(s => {
                const frp = s.F_R_P_Food || 'Paid';
                const badge = frp === 'Free' ? 'badge-free' : frp === 'Reduced' ? 'badge-reduced' : 'badge-paid';
                const key = encodeURIComponent(s.First_Name) + '/' + encodeURIComponent(s.Last_Name);
                html += `<tr>
                    <td style="font-weight:600;">${s.Last_Name}, ${s.First_Name}</td>
                    <td>${room}</td>
                    <td><input type="number" value="${s.HouseholdIncome || ''}" id="inc-${key}" style="width:80px;padding:3px 6px;border:1px solid var(--border);border-radius:4px;font-size:0.78rem;" max="100000" min="0"></td>
                    <td><input type="number" value="${s.HouseholdSize || ''}" id="hs-${key}" style="width:50px;padding:3px 6px;border:1px solid var(--border);border-radius:4px;font-size:0.78rem;" min="1" max="15"></td>
                    <td><span class="${badge}">${frp}</span></td>
                    <td><button onclick="saveIncome('${key}')" style="padding:3px 10px;background:var(--primary);color:white;border:none;border-radius:4px;font-size:0.7rem;font-weight:700;cursor:pointer;">Save</button></td>
                </tr>`;
            });
        }
        tbody.innerHTML = html;
    } catch (e) {
        document.getElementById('foodBody').innerHTML = '<tr><td colspan="5" style="text-align:center;padding:32px;color:var(--danger);">Failed to load.</td></tr>';
    }
}

load();

async function saveIncome(key) {
    const income = document.getElementById(`inc-${key}`)?.value || '';
    const hhSize = document.getElementById(`hs-${key}`)?.value || '';
    const [firstName, lastName] = key.split('/').map(decodeURIComponent);

    // Auto-calculate F/R/P
    const freeThresholds    = [19578,26572,33566,40560,47554,54548,61542,68536];
    const reducedThresholds = [27861,37814,47767,57720,67673,77626,87579,97532];
    const idx = Math.max(0, Math.min(parseInt(hhSize)||1, 8) - 1);
    const inc = parseInt(income) || 100000;
    let frpFood = 'Paid';
    if (inc <= freeThresholds[idx]) frpFood = 'Free';
    else if (inc <= reducedThresholds[idx]) frpFood = 'Reduced';

    try {
        const res = await fetch(`/api/students/${encodeURIComponent(firstName)}/${encodeURIComponent(lastName)}`, {
            method: 'PUT',
            headers: { 'Authorization': AUTH, 'Content-Type': 'application/json' },
            body: JSON.stringify({
                firstName, lastName,
                householdIncome: income,
                householdSize: hhSize,
                frpFood: frpFood,
            })
        });
        const data = await res.json();
        if (data.success) {
            alert(`${firstName} ${lastName} updated — ${frpFood}`);
            load(); // refresh
        } else {
            alert('Failed: ' + (data.error || ''));
        }
    } catch (e) {
        alert('Error: ' + e.message);
    }
}
</script>
</body>
</html>
