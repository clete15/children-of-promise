<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Food Program – Children Of Promise</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        body { background: linear-gradient(to right, #5585e0 0%, #2563eb 10%, #1e3a8a 100%); min-height: 100vh; }
        .fp-layout { display:flex;height:calc(100vh - 90px);align-items:flex-start;justify-content:center;padding:20px; }
        .fp-wrapper { display:flex;max-height:calc(100vh - 130px);width:100%;max-width:1100px; }
        .fp-sidebar { width:180px;flex-shrink:0;background:rgba(255,255,255,0.12);overflow-y:auto;padding:8px 0;border-radius:12px 0 0 12px; }
        .fp-sidebar button, .fp-sidebar a { display:block;width:100%;text-align:left;padding:12px 16px;border:none;cursor:pointer;background:transparent;transition:background 0.15s;text-decoration:none; }
        .fp-sidebar button.active { background:rgba(255,255,255,0.2); }
        .fp-sidebar button:hover:not(.active), .fp-sidebar a:hover { background:rgba(255,255,255,0.1); }
        .fp-sidebar .nav-label { font-size:0.82rem;font-weight:700;color:white; }
        .fp-sidebar .nav-sub { font-size:0.75rem;font-weight:600;color:rgba(255,255,255,0.8);padding-left:28px; }
        .fp-card { background:white;flex:1;display:flex;flex-direction:column;overflow:hidden;border-radius:0 12px 12px 0;box-shadow:0 4px 24px rgba(0,0,0,0.2);max-height:calc(100vh - 130px);max-width:900px; }
        .fp-header { padding:14px 20px;border-bottom:1px solid #e5e7eb;display:flex;align-items:center;gap:12px; }
        .fp-header h2 { font-size:1rem;font-weight:800;color:#1e3a8a;margin:0; }
        .fp-body { overflow-y:auto;flex:1;padding:20px 24px; }
    </style>
</head>
<body>

<header class="site-header">
    <a class="brand-link" href="/staff/">
        <img src="logo-sm.png" alt="Children Of Promise">
        <div class="brand-text">
            <h1>Children Of Promise</h1>
            <p>Food Program Management System &nbsp;·&nbsp; Millstadt, IL</p>
        </div>
    </a>
    <a class="header-back" href="/staff/">← Staff Portal</a>
</header>

<div class="fp-layout">
    <div class="fp-wrapper">
        <div class="fp-sidebar">
            <button class="active" id="navFood" onclick="showPanel('food')">
                <div class="nav-label">🍽️ Food Program</div>
            </button>
            <button id="navRoster" onclick="showPanel('roster')">
                <div class="nav-sub">📋 Full Roster</div>
            </button>
            <button id="navCount" onclick="printFoodCountSheets()">
                <div class="nav-sub">🖨️ Monthly Count Sheets</div>
            </button>
            <a href="/staff/menus.html" target="_blank">
                <div class="nav-sub">🍽️ Weekly Menus</div>
            </a>
        </div>
        <div class="fp-card">
            <div class="fp-header">
                <h2 id="fpTitle">Food Program</h2>
            </div>
            <div class="fp-body" id="fpBody">
                <div>Loading...</div>
            </div>
        </div>
    </div>
</div>

<div id="foodPrintFrame" style="display:none;"></div>

<script>
const AUTH = 'Basic ' + btoa(':cofpadmin');
function apiFetch(url, opts = {}) {
    opts.headers = Object.assign({ 'Authorization': AUTH, 'Content-Type': 'application/json' }, opts.headers || {});
    return fetch(url, opts);
}

let students = [];
let classrooms = [];
let currentPanel = 'food';

async function init() {
    try {
        const [sRes, cRes] = await Promise.all([
            apiFetch('/api/students'),
            apiFetch('/api/classrooms')
        ]);
        students = await sRes.json();
        classrooms = await cRes.json();
        showPanel('food');
    } catch (e) {
        document.getElementById('fpBody').innerHTML = '<div style="color:red;padding:20px;">Error loading data: ' + e.message + '</div>';
    }
}

function isTruthy(v) {
    if (v === true || v === 1 || v === '1') return true;
    if (typeof v === 'string') return v.toLowerCase() === 'yes';
    return false;
}

function showPanel(panel) {
    currentPanel = panel;
    document.querySelectorAll('.fp-sidebar button').forEach(b => b.classList.remove('active'));
    if (panel === 'food') {
        document.getElementById('navFood').classList.add('active');
        document.getElementById('fpTitle').textContent = 'Food Program';
        renderFoodReport();
    } else if (panel === 'roster') {
        document.getElementById('navRoster').classList.add('active');
        document.getElementById('fpTitle').textContent = 'Full Roster';
        renderFullRoster();
    }
}

function renderFoodReport() {
    const active = students.filter(s => isTruthy(s.Active));
    const free = active.filter(s => s.F_R_P_Food === 'Free').length;
    const reduced = active.filter(s => s.F_R_P_Food === 'Reduced').length;
    const paid = active.filter(s => s.F_R_P_Food === 'Paid').length;
    const unknown = active.length - free - reduced - paid;
    const max = Math.max(free, reduced, paid, unknown, 1);

    function bar(label, count, color) {
        const pct = Math.round(count / max * 100);
        return `<div style="display:flex;align-items:center;gap:10px;margin-bottom:8px;">
            <div style="font-size:0.8rem;font-weight:600;color:#374151;min-width:80px;">${label}</div>
            <div style="flex:1;background:#e2e8f0;border-radius:4px;height:20px;overflow:hidden;">
                <div style="height:100%;width:${Math.max(pct,3)}%;background:${color};border-radius:4px;display:flex;align-items:center;justify-content:flex-end;padding-right:6px;">
                    <span style="font-size:0.7rem;font-weight:700;color:white;">${count}</span>
                </div>
            </div>
        </div>`;
    }

    document.getElementById('fpBody').innerHTML =
        bar('Free', free, '#16a34a') +
        bar('Reduced', reduced, '#d97706') +
        bar('Paid', paid, '#2563eb') +
        bar('Unknown', unknown, '#94a3b8');
}

function renderFullRoster() {
    const active = students.filter(s => isTruthy(s.Active));
    const frpColor = v => v === 'Free' ? '#16a34a' : v === 'Reduced' ? '#d97706' : '#64748b';
    const roomOpts = classrooms.map(r => `<option value="${r.RoomNumber}">${r.Room}</option>`).join('');
    const rooms = [...new Set(active.map(s => s.Room || 'Unknown'))];
    const filterRoom = window._fpFilterRoom || 'All';
    const filtered = filterRoom === 'All' ? active : active.filter(s => (s.Room || 'Unknown') === filterRoom);

    let filterHtml = `<div style="display:grid;grid-template-columns:repeat(5,auto);gap:4px;margin-bottom:8px;align-items:center;">
        <button onclick="window._fpFilterRoom='All';renderFullRoster()" style="padding:3px 10px;border-radius:4px;border:none;font-size:0.7rem;cursor:pointer;background:${filterRoom==='All'?'#2563eb':'#e2e8f0'};color:${filterRoom==='All'?'white':'#374151'};font-weight:600;">All (${active.length})</button>`;
    rooms.forEach(rm => {
        const cnt = active.filter(s => (s.Room || 'Unknown') === rm).length;
        filterHtml += `<button onclick="window._fpFilterRoom='${rm}';renderFullRoster()" style="padding:3px 10px;border-radius:4px;border:none;font-size:0.7rem;cursor:pointer;background:${filterRoom===rm?'#2563eb':'#e2e8f0'};color:${filterRoom===rm?'white':'#374151'};font-weight:600;">${rm} (${cnt})</button>`;
    });
    filterHtml += `</div><div style="text-align:right;margin-bottom:6px;"><button onclick="exportFoodExcel()" style="padding:4px 12px;background:#16a34a;color:white;border:none;border-radius:5px;font-size:0.7rem;font-weight:600;cursor:pointer;">📥 Export</button></div>`;

    document.getElementById('fpBody').innerHTML = filterHtml + `
        <div style="max-height:calc(100vh - 300px);overflow:auto;">
        <table style="width:100%;border-collapse:collapse;font-size:0.78rem;table-layout:fixed;">
            <colgroup>
                <col style="width:160px;">
                <col style="width:130px;">
                <col style="width:45px;">
                <col style="width:80px;">
                <col style="width:40px;">
                <col style="width:42px;">
            </colgroup>
            <thead><tr style="background:#f8fafc;border-bottom:2px solid #e5e7eb;position:sticky;top:0;z-index:1;">
                <th style="padding:6px 6px;text-align:left;font-size:0.65rem;font-weight:700;text-transform:uppercase;color:#6b7280;">Name</th>
                <th style="padding:6px 4px;text-align:left;font-size:0.65rem;font-weight:700;text-transform:uppercase;color:#6b7280;">Room</th>
                <th style="padding:6px 4px;text-align:center;font-size:0.65rem;font-weight:700;text-transform:uppercase;color:#6b7280;">F/R/P</th>
                <th style="padding:6px 4px;text-align:right;font-size:0.65rem;font-weight:700;text-transform:uppercase;color:#6b7280;">Income</th>
                <th style="padding:6px 4px;text-align:center;font-size:0.65rem;font-weight:700;text-transform:uppercase;color:#6b7280;">HH</th>
                <th style="padding:6px 3px;text-align:center;font-size:0.65rem;font-weight:700;text-transform:uppercase;color:#6b7280;">Save</th>
            </tr></thead>
            <tbody>${filtered.map((s, i) => `<tr style="border-bottom:1px solid #f3f4f6;" onmouseover="this.style.background='#f8fafc'" onmouseout="this.style.background=''">
                <td style="padding:4px 6px;font-weight:600;white-space:nowrap;font-size:0.75rem;">${s.Last_Name}, ${s.First_Name}</td>
                <td style="padding:3px 3px;"><select id="frRoom_${i}" onchange="markFRChanged(${i})" style="padding:2px 2px;border:1px solid #d1d5db;border-radius:3px;font-size:0.67rem;width:100%;">${roomOpts}</select></td>
                <td style="padding:4px 4px;text-align:center;font-weight:700;color:${frpColor(s.F_R_P_Food)};" id="frFRP_${i}">${s.F_R_P_Food || '—'}</td>
                <td style="padding:3px 3px;"><input type="number" id="frIncome_${i}" value="${s.HouseholdIncome || ''}" onchange="markFRChanged(${i})" style="width:68px;padding:2px 3px;border:1px solid #d1d5db;border-radius:3px;font-size:0.67rem;text-align:right;"></td>
                <td style="padding:3px 3px;"><input type="number" id="frHH_${i}" value="${s.HouseholdSize || ''}" min="1" max="15" onchange="markFRChanged(${i})" style="width:30px;padding:2px 2px;border:1px solid #d1d5db;border-radius:3px;font-size:0.67rem;text-align:center;"></td>
                <td style="padding:3px 3px;text-align:center;"><button id="frSave_${i}" onclick="saveFRRow(${i})" disabled style="padding:2px 5px;background:#2563eb;color:white;border:none;border-radius:3px;font-size:0.6rem;font-weight:700;cursor:pointer;opacity:0.3;">Save</button></td>
            </tr>`).join('')}</tbody>
        </table></div>`;
    // Set room dropdowns
    filtered.forEach((s, i) => {
        const sel = document.getElementById('frRoom_' + i);
        if (sel) sel.value = s.RoomNumber || '';
    });
}

function markFRChanged(i) {
    const btn = document.getElementById('frSave_' + i);
    if (btn) { btn.disabled = false; btn.style.opacity = '1'; }
}

async function saveFRRow(i) {
    const active = students.filter(s => isTruthy(s.Active));
    const filterRoom = window._fpFilterRoom || 'All';
    const filtered = filterRoom === 'All' ? active : active.filter(s => (s.Room || 'Unknown') === filterRoom);
    const s = filtered[i];
    if (!s) return;
    const newIncome = document.getElementById('frIncome_' + i).value;
    const newHH = document.getElementById('frHH_' + i).value;
    const newRoom = document.getElementById('frRoom_' + i).value;
    const btn = document.getElementById('frSave_' + i);
    btn.disabled = true; btn.textContent = '…';
    try {
        const res = await apiFetch('/api/students/' + encodeURIComponent(s.First_Name) + '/' + encodeURIComponent(s.Last_Name), {
            method: 'PUT', body: JSON.stringify({ householdIncome: newIncome, householdSize: newHH, roomNumber: newRoom })
        });
        const data = await res.json();
        if (data.success) {
            s.HouseholdIncome = newIncome;
            s.HouseholdSize = newHH;
            s.RoomNumber = newRoom;
            const cr = classrooms.find(c => String(c.RoomNumber) === String(newRoom));
            if (cr) s.Room = cr.Room;
            // Refresh F/R/P from server
            const sRes = await apiFetch('/api/students');
            const allStudents = await sRes.json();
            const updated = allStudents.find(x => x.First_Name === s.First_Name && x.Last_Name === s.Last_Name);
            if (updated) {
                s.F_R_P_Food = updated.F_R_P_Food;
                const frpEl = document.getElementById('frFRP_' + i);
                const frpColor = v => v === 'Free' ? '#16a34a' : v === 'Reduced' ? '#d97706' : '#64748b';
                if (frpEl) { frpEl.textContent = updated.F_R_P_Food || '—'; frpEl.style.color = frpColor(updated.F_R_P_Food); }
            }
            students = allStudents;
            btn.style.opacity = '0.3';
        } else { btn.disabled = false; btn.style.opacity = '1'; }
    } catch (e) { btn.disabled = false; btn.style.opacity = '1'; }
    finally { btn.textContent = 'Save'; }
}

function exportFoodExcel() {
    const active = students.filter(s => isTruthy(s.Active));
    const headers = ['First_Name','Last_Name','PFA_PI_na','Room','F_R_P_Food','HouseholdIncome','HouseholdSize'];
    let csv = headers.join('\t') + '\n';
    active.forEach(s => { csv += [s.First_Name, s.Last_Name, s.PFA_PI_na||'', s.Room||'', s.F_R_P_Food||'', s.HouseholdIncome||'', s.HouseholdSize||''].join('\t') + '\n'; });
    const blob = new Blob([csv], { type: 'application/vnd.ms-excel' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'Food_Program_Roster_' + new Date().toISOString().split('T')[0] + '.xls';
    a.click();
}

function printFoodCountSheets() {
    const input = prompt('Enter month (YYYY-MM):', new Date().getFullYear() + '-' + String(new Date().getMonth() + 2).padStart(2,'0'));
    if (!input) return;
    const parts = input.split('-');
    const year = parseInt(parts[0]);
    const month = parseInt(parts[1]) - 1;
    if (isNaN(year) || isNaN(month)) { alert('Invalid format'); return; }

    const active = students.filter(s => isTruthy(s.Active));
    const monthNames = ['January','February','March','April','May','June','July','August','September','October','November','December'];
    const monthYear = monthNames[month] + ' ' + year;
    const daysInMonth = new Date(year, month + 1, 0).getDate();
    const meals = ['Breakfast', 'Lunch', 'PM Snack'];
    const weekendDays = [];
    for (let d = 1; d <= daysInMonth; d++) { if ([0,6].includes(new Date(year, month, d).getDay())) weekendDays.push(d); }

    const roomGroups = {};
    active.forEach(s => { const room = s.Room || 'Room ' + s.RoomNumber; if (!roomGroups[room]) roomGroups[room] = []; roomGroups[room].push(s); });

    let html = '<!DOCTYPE html><html><head><style>';
    html += '@page{size:landscape;margin:0.2in}body{font-family:Arial,sans-serif;margin:0;-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important}';
    html += '.sheet{page-break-after:always;padding:6px}.sheet:last-child{page-break-after:auto}';
    html += 'table{border-collapse:collapse;width:100%;font-size:9px;table-layout:fixed}th,td{border:1px solid #000;padding:3px 2px;text-align:center}';
    html += 'th{background:#d9d9d9;font-size:8px;font-weight:bold}.name-col{text-align:left;min-width:140px;font-size:9px;white-space:nowrap;padding-left:4px;font-weight:bold}';
    html += '.frp-col{font-weight:bold;width:20px;background:#f0f0f0}.day-col{width:18px;min-width:18px}.day-col.weekend{background:#808080!important}';
    html += '.total-col{width:30px;background:#d9d9d9;font-weight:bold}.total-col-free{width:30px;background:#d9d9d9;font-weight:bold;border-left:3px solid #000}';
    html += '.totals-row td{font-weight:bold;font-size:8px;background:#e8e8e8}.separator-row td{border-top:3px solid #000}';
    html += '.header{text-align:center;margin-bottom:4px}.header h2{margin:0;font-size:14px}.meta{display:flex;justify-content:space-between;font-size:11px;margin-bottom:3px;padding:0 4px}.meta span{font-weight:bold}';
    html += '</style></head><body>';

    const order = {'free':0,'reduced':1,'paid':2};
    Object.keys(roomGroups).sort().forEach(room => {
        const roomStudents = [...roomGroups[room]].sort((a,b) => {
            const av = order[(a.F_R_P_Food||'').trim().toLowerCase()] !== undefined ? order[(a.F_R_P_Food||'').trim().toLowerCase()] : 2;
            const bv = order[(b.F_R_P_Food||'').trim().toLowerCase()] !== undefined ? order[(b.F_R_P_Food||'').trim().toLowerCase()] : 2;
            return av !== bv ? av - bv : (a.Last_Name||'').localeCompare(b.Last_Name||'');
        });

        // Attendance sheet
        html += '<div class="sheet"><div class="header"><h2>DAILY ATTENDANCE RECORD</h2></div>';
        html += '<div class="meta"><span>Site: Children of Promise</span><span>Month/Year: '+monthYear+'</span></div>';
        html += '<div class="meta"><span>Classroom: '+room+'</span></div>';
        html += '<table><thead><tr><th class="name-col">Child\'s Full Name</th>';
        for(let d=1;d<=daysInMonth;d++){html+='<th class="day-col'+(weekendDays.includes(d)?' weekend':'')+'">'+d+'</th>';}
        html += '<th class="total-col-free">Total</th></tr></thead><tbody>';
        roomStudents.forEach((s,i)=>{html+='<tr><td class="name-col">'+(i+1)+'. '+s.Last_Name+', '+s.First_Name+'</td>';for(let d=1;d<=daysInMonth;d++)html+='<td class="day-col'+(weekendDays.includes(d)?' weekend':'')+'"></td>';html+='<td class="total-col-free"></td></tr>';});
        for(let e=roomStudents.length;e<19;e++){html+='<tr><td class="name-col">'+(e+1)+'.</td>';for(let d=1;d<=daysInMonth;d++)html+='<td class="day-col'+(weekendDays.includes(d)?' weekend':'')+'"></td>';html+='<td class="total-col-free"></td></tr>';}
        html+='<tr class="totals-row separator-row"><td class="name-col"><strong>Daily Total</strong></td>';for(let d=1;d<=daysInMonth;d++)html+='<td class="'+(weekendDays.includes(d)?'weekend':'')+'"></td>';html+='<td class="total-col-free"></td></tr></tbody></table></div>';

        // Meal sheets
        meals.forEach(meal => {
            html += '<div class="sheet"><div class="header"><h2>MEAL PARTICIPATION RECORD</h2></div>';
            html += '<div class="meta"><span>Site: Children of Promise</span><span>Month/Year: '+monthYear+'</span></div>';
            html += '<div class="meta"><span>Classroom: '+room+'</span><span>Program: ☑ Child Care Center</span><span>Meal Service: ☑ '+meal+'</span></div>';
            html += '<table><thead><tr><th class="name-col">Child\'s Full Name</th><th class="frp-col">F/R/P</th>';
            for(let d=1;d<=daysInMonth;d++)html+='<th class="day-col'+(weekendDays.includes(d)?' weekend':'')+'">'+d+'</th>';
            html += '<th class="total-col-free">Free</th><th class="total-col">Red</th><th class="total-col">Paid</th></tr></thead><tbody>';
            roomStudents.forEach((s,i)=>{const frp=(s.F_R_P_Food||'P').charAt(0).toUpperCase();html+='<tr><td class="name-col">'+(i+1)+'. '+s.Last_Name+', '+s.First_Name+'</td><td class="frp-col">'+frp+'</td>';for(let d=1;d<=daysInMonth;d++)html+='<td class="day-col'+(weekendDays.includes(d)?' weekend':'')+'"></td>';html+='<td class="total-col-free"></td><td class="total-col"></td><td class="total-col"></td></tr>';});
            for(let e=roomStudents.length;e<19;e++){html+='<tr><td class="name-col">'+(e+1)+'.</td><td class="frp-col"></td>';for(let d=1;d<=daysInMonth;d++)html+='<td class="day-col'+(weekendDays.includes(d)?' weekend':'')+'"></td>';html+='<td class="total-col-free"></td><td class="total-col"></td><td class="total-col"></td></tr>';}
            html+='<tr class="totals-row separator-row"><td class="name-col"><strong>Daily Totals</strong></td><td></td>';for(let d=1;d<=daysInMonth;d++)html+='<td class="'+(weekendDays.includes(d)?'weekend':'')+'"></td>';html+='<td class="total-col-free"></td><td class="total-col"></td><td class="total-col"></td></tr>';
            ['Free Daily Totals','Reduced Daily Totals','Paid Daily Totals'].forEach(label=>{html+='<tr class="totals-row"><td class="name-col">'+label+'</td><td></td>';for(let d=1;d<=daysInMonth;d++)html+='<td class="'+(weekendDays.includes(d)?'weekend':'')+'"></td>';html+='<td class="total-col-free"></td><td class="total-col"></td><td class="total-col"></td></tr>';});
            html += '</tbody></table><div style="font-size:7px;text-align:right;margin-top:3px;color:#666;">ISBE 68-75 (9/13)</div></div>';
        });
    });
    html += '</body></html>';

    let frame = document.getElementById('foodPrintFrame');
    if (frame) frame.remove();
    frame = document.createElement('iframe');
    frame.id = 'foodPrintFrame';
    frame.style.cssText = 'position:fixed;left:-9999px;top:0;width:0;height:0;';
    document.body.appendChild(frame);
    frame.contentDocument.open();
    frame.contentDocument.write(html);
    frame.contentDocument.close();
    setTimeout(() => frame.contentWindow.print(), 500);
}

init();
</script>
</body>
</html>
