<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Waiting List – Children Of Promise</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .wl-toolbar {
            max-width: 1100px;
            margin: 16px auto 0;
            padding: 0 24px;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }
        body { background: linear-gradient(to right, #5585e0 0%, #2563eb 10%, #1e3a8a 100%); min-height: 100vh; }
        .wl-search { background: rgba(255,255,255,0.9); }
        .wl-count { color: rgba(255,255,255,0.8); }
        .tab-count { color: rgba(255,255,255,0.7); }
        .mode-toggle { background: rgba(255,255,255,0.15) !important; }
        .toggle-btn { color: rgba(255,255,255,0.8) !important; }
        .toggle-btn.active { background: white !important; color: var(--primary) !important; }        .wl-search {
            flex: 1;
            min-width: 200px;
            padding: 8px 12px;
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 0.85rem;
            font-family: inherit;
        }
        .wl-search:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(37,99,235,0.1); }
        .wl-count { font-size: 0.8rem; color: var(--text-muted); white-space: nowrap; }

        .wl-container {
            max-width: 1100px;
            margin: 14px auto 40px;
            padding: 0 24px;
        }
        .wl-table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            border-radius: var(--radius);
            overflow: hidden;
            box-shadow: var(--shadow);
            font-size: 0.8rem;
        }
        .wl-table thead tr {
            background: #f8fafc;
            border-bottom: 2px solid var(--border);
        }
        .wl-table th {
            padding: 10px 12px;
            text-align: left;
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: var(--text-muted);
            white-space: nowrap;
        }
        .wl-table td {
            padding: 10px 12px;
            border-bottom: 1px solid var(--border);
            vertical-align: top;
        }
        .notes-cell { min-width: 220px; }
        .notes-input {
            width: 100%;
            padding: 7px 8px;
            border: 1px solid var(--border);
            border-radius: 5px;
            font-size: 0.78rem;
            font-family: inherit;
            resize: vertical;
            min-height: 80px;
            color: var(--text);
        }
        .notes-input:focus { outline: none; border-color: var(--primary); }
        .btn-save-notes {
            margin-top: 4px;
            padding: 4px 12px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 0.72rem;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.15s;
        }
        .btn-save-notes:hover { background: var(--primary-dark); }
        .wl-table tbody tr:last-child td { border-bottom: none; }
        .wl-table tbody tr:hover { background: #f8fafc; }

        .score-badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 20px;
            font-weight: 700;
            font-size: 0.78rem;
            white-space: nowrap;
        }
        .score-high   { background: #fef2f2; color: var(--danger); }
        .score-medium { background: #fffbeb; color: #b45309; }
        .score-low    { background: #f0fdf4; color: var(--success); }

        .flag-list { display: flex; flex-wrap: wrap; gap: 4px; }
        .flag {
            padding: 2px 7px;
            border-radius: 4px;
            font-size: 0.68rem;
            font-weight: 700;
            background: #eff6ff;
            color: var(--primary);
            white-space: nowrap;
        }
        .flag.high { background: #fef2f2; color: var(--danger); }

        .status-select {
            padding: 6px 8px;
            border: 1px solid var(--border);
            border-radius: 5px;
            font-size: 0.78rem;
            font-family: inherit;
            cursor: pointer;
            width: 100%;
            min-width: 120px;
        }
        .status-select:focus { outline: none; border-color: var(--primary); }

        .wl-empty {
            text-align: center;
            padding: 48px;
            color: var(--text-muted);
            font-size: 0.9rem;
        }
        .submitted-date { font-size: 0.72rem; color: var(--text-muted); }
        .tab-count { font-size: 0.75rem; font-weight: 600; opacity: 0.75; }
        .mode-toggle { display:flex; background:#e2e8f0; border-radius:10px; padding:4px; gap:4px; }
        .toggle-btn { flex:1; padding:10px 16px; border:none; border-radius:7px; font-size:0.82rem; font-weight:700; cursor:pointer; color:var(--text-muted); background:transparent; transition:background 0.18s,color 0.18s; white-space:nowrap; }
        .toggle-btn.active { background:white; color:var(--primary); box-shadow:0 1px 6px rgba(0,0,0,0.12); }

        /* ── ENROLL MODAL ── */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }
        .modal-overlay.open { display: flex; }
        .modal {
            background: white;
            border-radius: var(--radius);
            padding: 28px 32px;
            width: 100%;
            max-width: 620px;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 8px 32px rgba(0,0,0,0.25);
        }
        .modal-title {
            font-size: 1.1rem;
            font-weight: 800;
            color: var(--primary);
            margin-bottom: 4px;
        }
        .modal-subtitle {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-bottom: 20px;
            padding-bottom: 14px;
            border-bottom: 1px solid var(--border);
        }
        .modal-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .modal-group { display: flex; flex-direction: column; gap: 4px; }
        .modal-group.full { grid-column: 1 / -1; }
        .modal-group label { font-size: 0.72rem; font-weight: 600; color: var(--text-muted); }
        .modal-group input, .modal-group select {
            padding: 7px 10px;
            border: 1px solid var(--border);
            border-radius: 5px;
            font-size: 0.82rem;
            font-family: inherit;
            color: var(--text);
        }
        .modal-group input:focus, .modal-group select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(37,99,235,0.1);
        }
        .modal-group input[readonly] { background: #f8fafc; color: var(--text-muted); }
        .modal-teacher-hint { font-size: 0.72rem; color: var(--danger); font-weight: 600; min-height: 1em; }
        .modal-days { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 4px; }
        .modal-days label { display: flex; align-items: center; gap: 5px; font-size: 0.8rem; font-weight: 600; cursor: pointer; }
        .modal-days input[type=checkbox] { width: auto; accent-color: var(--primary); }
        .modal-actions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 20px; padding-top: 14px; border-top: 1px solid var(--border); }
        .modal-note { font-size: 0.75rem; color: var(--text-muted); background: #fffbeb; border: 1px solid #fde68a; border-radius: 6px; padding: 8px 12px; margin-bottom: 16px; }
    </style>
</head>
<body>

<header class="site-header">
    <a class="brand-link" href="index.html">
        <img src="ChildrenOfPromise.png" alt="Children Of Promise">
        <div class="brand-text">
            <h1>Children Of Promise</h1>
            <p>Pre-Enrollment Waiting List &nbsp;·&nbsp; Millstadt, IL</p>
        </div>
    </a>
    <a class="header-back" href="index.html">← Staff Portal</a>
</header>

<div class="wl-toolbar">
    <div class="mode-toggle" style="max-width:520px;width:100%;">
        <button class="toggle-btn active" id="tab-0-2" onclick="setTab('0-2')">🍼 Infant &amp; Toddler <span class="tab-count" id="count-0-2"></span></button>
        <button class="toggle-btn" id="tab-2-3" onclick="setTab('2-3')">🧒 2-Year Olds <span class="tab-count" id="count-2-3"></span></button>
        <button class="toggle-btn" id="tab-3-5" onclick="setTab('3-5')">🎨 Pre-School <span class="tab-count" id="count-3-5"></span></button>
    </div>
</div>
<div class="wl-toolbar" style="margin-top:10px;">
    <input class="wl-search" type="text" id="searchInput" placeholder="Search by name, phone, or email…" oninput="renderTable()">
    <span class="wl-count" id="wlCount"></span>
</div>

<div class="wl-container">
    <table class="wl-table">
        <thead>
            <tr>
                <th>#</th>
                <th>Name</th>
                <th>Contact</th>
                <th>Children</th>
                <th>Score</th>
                <th>Risk Factors</th>
                <th style="background:#fffbeb;color:#92400e;">Household Income</th>
                <th>Submitted</th>
                <th>Status</th>
                <th>Notes</th>
            </tr>
        </thead>
        <tbody id="wlBody">
            <tr><td colspan="8" class="wl-empty">Loading…</td></tr>
        </tbody>
    </table>
</div>

<script>
const AUTH = 'Basic ' + btoa(':cofpadmin');
let allRows = [];
let classrooms = [];
let activeTab = '0-2';

async function load() {
    try {
        const [wlRes] = await Promise.all([
            fetch('/api/waitinglist', { headers: { 'Authorization': AUTH } }),
        ]);
        allRows = await wlRes.json();
        updateTabCounts();
        renderTable();
    } catch (e) {
        document.getElementById('wlBody').innerHTML = `<tr><td colspan="9" class="wl-empty">Failed to load waiting list.</td></tr>`;
    }
}

function updateTabCounts() {
    ['0-2','2-3','3-5'].forEach(tab => {
        const count = allRows.filter(r => r.AgeGroup === tab && r.WaitlistStatus !== 'Declined').length;
        const el = document.getElementById(`count-${tab}`);
        if (el) el.textContent = count ? `(${count})` : '';
    });
}

function setTab(tab) {
    activeTab = tab;
    ['0-2','2-3','3-5'].forEach(t => document.getElementById(`tab-${t}`).classList.toggle('active', t === tab));
    renderTable();
}

function renderTable() {
    const q = document.getElementById('searchInput').value.toLowerCase();
    const rows = allRows.filter(r =>
        r.AgeGroup === activeTab &&
        r.WaitlistStatus !== 'Declined' &&
        (!q || `${r.FirstName} ${r.LastName}`.toLowerCase().includes(q) ||
         (r.Phone || '').toLowerCase().includes(q) ||
         (r.Email || '').toLowerCase().includes(q))
    );

    document.getElementById('wlCount').textContent = `${rows.length} record${rows.length !== 1 ? 's' : ''}`;

    if (!rows.length) {
        document.getElementById('wlBody').innerHTML = `<tr><td colspan="9" class="wl-empty">No records found.</td></tr>`;
        return;
    }

    document.getElementById('wlBody').innerHTML = rows.map((r, i) => {
        const score = parseInt(r.Score) || 0;
        const scoreClass = score >= 50 ? 'score-high' : score >= 10 ? 'score-medium' : 'score-low';
        const flags = buildFlags(r);
        const date = r.SubmittedAt ? r.SubmittedAt.split(' ')[0] : '—';
        const isEnrolled = r.WaitlistStatus === 'Enrolled';

        return `<tr>
            <td>${i + 1}</td>
            <td><strong>${r.LastName}, ${r.FirstName}</strong></td>
            <td>
                <div>${r.Phone || '—'}</div>
                <div style="font-size:0.72rem;color:var(--text-muted)">${r.Email || ''}</div>
            </td>
            <td style="max-width:160px;">${r.ChildrenInfo || '—'}</td>
            <td><span class="score-badge ${scoreClass}">${score} pts</span></td>
            <td><div class="flag-list">${flags}</div></td>
            <td style="background:#fffbeb;font-weight:600;font-size:0.78rem;">${r.HouseholdIncome || '<span style="color:#92400e;">—</span>'}</td>
            <td><span class="submitted-date">${date}</span></td>
            <td>
                <select class="status-select" onchange="handleStatusChange(${r.Id}, this)" ${isEnrolled ? 'disabled' : ''}>
                    <option ${r.WaitlistStatus==='Pending'?'selected':''}>Pending</option>
                    <option ${r.WaitlistStatus==='Contacted'?'selected':''}>Contacted</option>
                    <option ${r.WaitlistStatus==='Enrolled'?'selected':''}>Enrolled</option>
                    <option value="Declined">Declined</option>
                </select>
            </td>
            <td class="notes-cell">
                <textarea class="notes-input" id="notes-${r.Id}" placeholder="Add notes…">${r.Notes || ''}</textarea>
                <button class="btn-save-notes" onclick="saveNotes(${r.Id})">Save</button>
            </td>
        </tr>`;
    }).join('');
}

function buildFlags(r) {
    const flags = [];
    const hi = l => `<span class="flag high">${l}</span>`;
    const lo = l => `<span class="flag">${l}</span>`;
    if (r.Homeless === 'Yes')           flags.push(hi('Homeless'));
    if (r.FosterAdopted === 'Yes')      flags.push(hi('Foster/Adopted'));
    if (r.IEP === 'Yes')                flags.push(lo('IEP'));
    if (r.EarlyIntervention === 'Yes')  flags.push(lo('Early Intervention'));
    if (r.AbuseHistory === 'Yes')       flags.push(lo('Abuse/DV'));
    if (r.MentalIllness === 'Yes')      flags.push(lo('Mental/Chronic Illness'));
    if (r.DcfsInvolvement === 'Yes')    flags.push(lo('DCFS'));
    if (r.SubstanceAbuse === 'Yes')     flags.push(lo('Substance Abuse'));
    if (r.CaregiverOther === 'Yes')     flags.push(lo('Non-Parent Caregiver'));
    if (r.FamilyDeath === 'Yes')        flags.push(lo('Family Death'));
    if (r.LowBirthWeight === 'Yes')     flags.push(lo('Low Birth Weight'));
    if (r.ParentIncarcerated === 'Yes') flags.push(lo('Parent Incarcerated'));
    if (r.TeenParent === 'Yes')         flags.push(lo('Teen Parent'));
    if (r.NoHSDiploma === 'Yes')        flags.push(lo('No HS Diploma'));
    if (r.BornOutsideUS === 'Yes')      flags.push(lo('Immigrant/Refugee'));
    if (r.NonEnglishHome === 'Yes')     flags.push(lo('Non-English Home'));
    if (r.ActiveMilitary === 'Yes')     flags.push(lo('Military'));
    if (r.PublicBenefits)               flags.push(lo('Public Benefits'));
    if (r.LivingSituation === 'Single Parent') flags.push(lo('Single Parent'));
    return flags.join('') || '<span style="color:var(--text-muted);font-size:0.72rem;">None</span>';
}

function handleStatusChange(id, selectEl) {
    const val = selectEl.value;

    if (val === 'Declined') {
        if (!confirm('Are you sure you want to remove this family from the waiting list? This cannot be undone.')) {
            // Revert select to previous value
            const row = allRows.find(r => r.Id == id);
            selectEl.value = row ? row.WaitlistStatus : 'Pending';
            return;
        }
        // Mark declined and remove from view
        updateStatusAPI(id, 'Declined').then(() => {
            const row = allRows.find(r => r.Id == id);
            if (row) row.WaitlistStatus = 'Declined';
            updateTabCounts();
            renderTable();
        });
        return;
    }

    if (val === 'Enroll') {
        // Revert — enrollment only happens through EMS
        const row = allRows.find(r => r.Id == id);
        selectEl.value = row ? row.WaitlistStatus : 'Pending';
        openEnrollModal(id);
        return;
    }

    // Pending or Contacted — save directly
    updateStatusAPI(id, val).then(() => {
        const row = allRows.find(r => r.Id == id);
        if (row) row.WaitlistStatus = val;
    });
}

async function updateStatusAPI(id, status) {
    try {
        await fetch(`/api/waitinglist/${id}`, {
            method: 'PUT',
            headers: { 'Authorization': AUTH, 'Content-Type': 'application/json' },
            body: JSON.stringify({ status })
        });
    } catch (e) { alert('Failed to update status'); }
}

async function saveNotes(id) {
    const notes = document.getElementById(`notes-${id}`).value;
    try {
        const res = await fetch(`/api/waitinglist/${id}`, {
            method: 'PUT',
            headers: { 'Authorization': AUTH, 'Content-Type': 'application/json' },
            body: JSON.stringify({ notes })
        });
        const data = await res.json();
        if (data.success) {
            const btn = document.querySelector(`#notes-${id} + button`);
            if (btn) { btn.textContent = 'Saved ✓'; setTimeout(() => btn.textContent = 'Save', 2000); }
        }
    } catch (e) { alert('Failed to save notes'); }
}

// ── ENROLL MODAL ──
function openEnrollModal(id) {
    enrollingId = id;
    const r = allRows.find(x => x.Id == id);
    if (!r) return;

    // Store pre-enrollment data and waiting list ID in sessionStorage
    sessionStorage.setItem('enrollFromWaitlist', JSON.stringify({
        waitlistId:      r.Id,
        firstName:       r.ChildName ? r.ChildName.split(' ')[0] : r.FirstName || '',
        lastName:        r.ChildName ? r.ChildName.split(' ').slice(1).join(' ') || r.LastName : r.LastName || '',
        cityTown:        r.City || '',
        birthDate:       r.ChildBirthDate || '',
        iep:             r.IEP === 'Yes',
        military:        r.ActiveMilitary === 'Yes',
        householdIncome: r.HouseholdIncome || '',
        householdSize:   r.HouseholdSize || '',
    }));

    // Redirect to EMS Add Student tab
    window.location.href = 'ems.html?enroll=1';
}

load();
</script>
</body>
</html>
