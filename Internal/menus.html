<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Fredoka:wght@500;600&display=swap" rel="stylesheet">
    <style>
        body { background: linear-gradient(to right, #5585e0 0%, #2563eb 10%, #1e3a8a 100%); min-height: 100vh; }
        .menu-layout { display:flex;align-items:flex-start;justify-content:center;padding:20px;min-height:calc(100vh - 90px); }
        .menu-container { background:white;border-radius:12px;box-shadow:0 4px 24px rgba(0,0,0,0.2);width:100%;max-width:1200px;overflow:hidden; }
        .menu-header { padding:16px 24px;border-bottom:1px solid #e5e7eb;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px; }
        .menu-header h2 { font-size:1.1rem;font-weight:800;color:#1e3a8a;margin:0; }
        .menu-controls { display:flex;gap:8px;align-items:center;flex-wrap:wrap; }
        .menu-controls button, .menu-controls a { padding:6px 14px;border-radius:6px;font-size:0.75rem;font-weight:600;cursor:pointer;border:none;transition:all 0.15s;text-decoration:none;display:inline-block; }
        .btn-primary { background:#2563eb;color:white; }
        .btn-primary:hover { background:#1d4ed8; }
        .btn-green { background:#16a34a;color:white; }
        .btn-purple { background:#7c3aed;color:white; }
        .btn-orange { background:#ea580c;color:white; }
        .menu-body { padding:24px;overflow-y:auto;max-height:calc(100vh - 180px); }
        .menu-section { margin-bottom:28px; }
        .menu-section-title { font-size:0.85rem;font-weight:700;color:#1e3a8a;text-transform:uppercase;letter-spacing:0.05em;margin-bottom:12px;padding-bottom:6px;border-bottom:2px solid #2563eb; }
        .menu-grid { display:grid;grid-template-columns:repeat(5,1fr);gap:8px; }
        .menu-day { border:1px solid #e5e7eb;border-radius:8px;overflow:hidden; }
        .menu-day-header { background:#f1f5f9;padding:8px 10px;font-size:0.72rem;font-weight:700;color:#374151;text-align:center;border-bottom:1px solid #e5e7eb; }
        .menu-day-header .day-date { font-size:0.65rem;font-weight:400;color:#6b7280;margin-top:2px; }
        .menu-day.holiday .menu-day-header { background:#fef2f2;color:#dc2626; }
        .menu-meal { padding:5px 8px;border-bottom:1px solid #f3f4f6; }
        .menu-meal:last-child { border-bottom:none; }
        .menu-meal-label { font-size:0.58rem;font-weight:700;text-transform:uppercase;color:#6b7280;margin-bottom:2px; }
        .menu-meal textarea { width:100%;border:1px solid #e5e7eb;border-radius:4px;padding:4px 6px;font-size:0.7rem;font-family:inherit;resize:vertical;min-height:62px;height:62px;transition:border-color 0.15s; }
        .menu-meal textarea:focus { outline:none;border-color:#2563eb;box-shadow:0 0 0 2px rgba(37,99,235,0.1); }
        .seasonal-banner { text-align:center;padding:8px;font-size:0.8rem;font-weight:700;border-radius:6px;margin-bottom:12px; }

        @media print {
            body { background:white !important; -webkit-print-color-adjust:exact !important; print-color-adjust:exact !important; }
            .site-header, .menu-controls, .header-back, .menu-body, .menu-header { display:none !important; }
            .menu-layout { display:none !important; }
            #printArea { display:block !important; }
        }
        #printArea { display:none; }
        #printArea .print-sheet { page-break-after:always;padding:20px;font-family:Arial,sans-serif; }
        #printArea .print-sheet:last-child { page-break-after:auto; }
        #printArea .print-header { display:flex;align-items:center;justify-content:center;gap:20px;margin-bottom:12px; }
        #printArea .print-header img { width:120px;height:120px;margin-left:15px; }
        #printArea .print-header h1 { font-size:32px;font-weight:700;color:#1e3a8a;margin:0;text-align:center;font-family:'Dancing Script',cursive; }
        #printArea .print-subtitle { text-align:center;font-size:14px;color:#6b7280;margin-bottom:12px;font-weight:600;font-family:'Fredoka',sans-serif; }
        #printArea table { width:100%;border-collapse:collapse;font-size:12px;table-layout:fixed; }
        #printArea th { background:#1e3a8a;color:white;padding:10px 6px;font-weight:700;text-transform:uppercase;font-size:11px;text-align:center;border:1px solid #1e3a8a; }
        #printArea td { border:1px solid #d1d5db;padding:10px 8px;text-align:center;vertical-align:middle;font-size:12px;line-height:1.6; }
        #printArea .meal-label { background:#f1f5f9;font-weight:800;color:#1e3a8a;text-align:center;width:100px;font-size:11px;text-transform:uppercase; }
        #printArea .holiday-cell { background:#f0fdf4;color:#16a34a;font-weight:700;font-size:14px; }

// Seasonal themes
function getSeasonalBanner(weekStart) {
    const m = weekStart.getMonth();
    const d = weekStart.getDate();
    // Check for holidays near this week
    if (m === 6 && d <= 7) return { text:'🎆 Happy 4th of July! 🎇', bg:'#fef2f2', color:'#dc2626' };
    if (m === 9 && d >= 25) return { text:'🎃 Happy Halloween! 👻', bg:'#fff7ed', color:'#ea580c' };
    if (m === 10 && d >= 18 && d <= 28) return { text:'🦃 Happy Thanksgiving! 🍂', bg:'#fefce8', color:'#a16207' };
    if (m === 11 && d >= 15) return { text:'🎄 Merry Christmas! ⛄', bg:'#f0fdf4', color:'#16a34a' };
    if (m === 1 && d >= 7 && d <= 16) return { text:'💕 Happy Valentine\'s Day! 💝', bg:'#fdf2f8', color:'#db2777' };
    if (m === 2 && d >= 10 && d <= 20) return { text:'☘️ Happy St. Patrick\'s Day! 🌈', bg:'#f0fdf4', color:'#16a34a' };
    if (m === 3 && d >= 14 && d <= 21) return { text:'🐣 Happy Easter! 🌷', bg:'#faf5ff', color:'#7c3aed' };
    // Seasons
    if (m >= 5 && m <= 7) return { text:'☀️ Summer Vibes! 🌊', bg:'#eff6ff', color:'#2563eb' };
    if (m >= 8 && m <= 10) return { text:'🍁 Fall Harvest Season 🌽', bg:'#fffbeb', color:'#d97706' };
    if (m >= 11 || m <= 1) return { text:'❄️ Winter Wonderland ⛄', bg:'#f0f9ff', color:'#0284c7' };
    if (m >= 2 && m <= 4) return { text:'🌸 Spring is Here! 🐝', bg:'#fdf4ff', color:'#a855f7' };
    return null;
}

function getMonday(d) {
    const date = new Date(d);
    const day = date.getDay();
    const diff = date.getDate() - day + (day === 0 ? -6 : 1);
    return new Date(date.setDate(diff));
}

function formatDate(d) { return (d.getMonth()+1) + '/' + d.getDate(); }
function getWeekKey() { return currentWeekStart.toISOString().split('T')[0]; }

function prevWeek() { currentWeekStart.setDate(currentWeekStart.getDate() - 7); render(); loadMenus().then(() => applyTemplate(getRotatingTemplateIndex(), false)); }
function nextWeek() { currentWeekStart.setDate(currentWeekStart.getDate() + 7); render(); loadMenus().then(() => applyTemplate(getRotatingTemplateIndex(), false)); }
function goToThisWeek() { currentWeekStart = getMonday(new Date()); render(); loadMenus().then(() => applyTemplate(getRotatingTemplateIndex(), false)); }

function render() {
    const dates = [];
    for (let i = 0; i < 5; i++) { const d = new Date(currentWeekStart); d.setDate(d.getDate() + i); dates.push(d); }
    document.getElementById('weekLabel').textContent = formatDate(currentWeekStart) + ' – ' + formatDate(dates[4]) + ', ' + currentWeekStart.getFullYear();
    document.getElementById('rotationLabel').textContent = '(Template Wk ' + (getRotatingTemplateIndex() + 1) + ' of 4)';

    // Seasonal banner
    const banner = getSeasonalBanner(currentWeekStart);
    const bannerEl = document.getElementById('seasonalBanner');
    if (banner) {
        bannerEl.innerHTML = `<div class="seasonal-banner" style="background:${banner.bg};color:${banner.color};">${banner.text}</div>`;
    } else { bannerEl.innerHTML = ''; }

    ['pfa','other'].forEach(section => {
        const grid = document.getElementById(section + 'Grid');
        grid.innerHTML = dates.map((d, di) => {
            const dayName = DAYS[di];
            const dateStr = formatDate(d);
            const isHoliday = (d.getMonth()===6 && d.getDate()===4) || (d.getMonth()===11 && d.getDate()===25);
            return `<div class="menu-day${isHoliday?' holiday':''}">
                <div class="menu-day-header">${dayName}<div class="day-date">${dateStr}</div></div>
                ${MEALS.map(meal => `<div class="menu-meal">
                    <div class="menu-meal-label">${meal}</div>
                    <textarea id="${section}_${di}_${meal.replace(/\s/g,'')}" placeholder="${meal}...">${isHoliday?'CLOSED - Holiday':''}</textarea>
                </div>`).join('')}
            </div>`;
        }).join('');
    });
}

function loadTemplate() {
    const idx = getRotatingTemplateIndex();
    const weekNum = prompt('Load template week (1-4):\n(Current rotation: Week ' + (idx+1) + ')', String(idx+1));
    const i = parseInt(weekNum) - 1;
    if (isNaN(i) || i < 0 || i > 3) { alert('Enter 1, 2, 3, or 4'); return; }
    applyTemplate(i, true);
}

function getRotatingTemplateIndex() {
    // Calculate which template week we're on based on ISO week number mod 4
    const d = new Date(currentWeekStart);
    const dayNum = (d.getDay() + 6) % 7;
    d.setDate(d.getDate() - dayNum + 3);
    const firstThursday = new Date(d.getFullYear(), 0, 4);
    const weekNum = Math.round(((d - firstThursday) / 86400000 + 1) / 7) + 1;
    return (weekNum - 1) % 4;
}

async function saveMenus() {
    const weekKey = getWeekKey();
    const templateIdx = getRotatingTemplateIndex();
    const data = { week: weekKey, pfa: {}, other: {}, templateIndex: templateIdx };
    ['pfa','other'].forEach(section => {
        for (let di = 0; di < 5; di++) {
            MEALS.forEach(meal => {
                const key = DAYS[di] + '_' + meal.replace(/\s/g,'');
                const el = document.getElementById(`${section}_${di}_${meal.replace(/\s/g,'')}`);
                if (el) data[section][key] = el.value;
            });
        }
        // Update the in-memory template so future rotations use the updated menu
        const template = TEMPLATES[section][templateIdx];
        DAYS.forEach((day, di) => {
            if (!template[day]) template[day] = {};
            MEALS.forEach(meal => {
                const mealKey = meal.replace(/\s/g,'');
                const el = document.getElementById(`${section}_${di}_${mealKey}`);
                if (el) template[day][mealKey] = el.value;
            });
        });
    });
    try {
        const res = await apiFetch('/api/menus', { method: 'POST', body: JSON.stringify(data) });
        const result = await res.json();
        if (result.success) {
            const btn = document.querySelector('.btn-green');
            btn.textContent = '✓ Saved (Wk ' + (templateIdx+1) + ')!';
            setTimeout(() => btn.textContent = '💾 Save', 2000);
        }
    } catch (e) { alert('Failed to save: ' + e.message); }
}

async function loadMenus() {
    const weekKey = getWeekKey();
    try {
        const res = await apiFetch('/api/menus?week=' + encodeURIComponent(weekKey));
        const data = await res.json();
        if (data && data.pfa) {
            ['pfa','other'].forEach(section => {
                const sectionData = data[section] || {};
                for (let di = 0; di < 5; di++) {
                    MEALS.forEach(meal => {
                        const key = DAYS[di] + '_' + meal.replace(/\s/g,'');
                        const el = document.getElementById(`${section}_${di}_${meal.replace(/\s/g,'')}`);
                        if (el && sectionData[key]) el.value = sectionData[key];
                    });
                }
            });
        }
    } catch (e) { /* no saved menu for this week */ }
}

function getSeasonalTheme(weekStart) {
    const m = weekStart.getMonth();
    const d = weekStart.getDate();
    // Check if a specific date falls within this Mon-Fri week
    function weekContains(month, day) {
        const target = new Date(weekStart.getFullYear(), month, day);
        const weekEnd = new Date(weekStart);
        weekEnd.setDate(weekEnd.getDate() + 4);
        return target >= weekStart && target <= weekEnd;
    }
    // Also check if holiday is on the weekend right after this week (Sat/Sun)
    function weekNear(month, day) {
        const target = new Date(weekStart.getFullYear(), month, day);
        const weekEnd = new Date(weekStart);
        weekEnd.setDate(weekEnd.getDate() + 6); // include Sat+Sun
        return target >= weekStart && target <= weekEnd;
    }
    // SVG corner art for each theme
    const svgSnowflakes = '<svg viewBox="0 0 60 60" width="110" height="110" style="opacity:0.4;"><path d="M30 5v50M5 30h50M12 12l36 36M48 12L12 48" stroke="currentColor" stroke-width="2" fill="none"/><circle cx="30" cy="30" r="4" fill="currentColor"/><circle cx="30" cy="10" r="2" fill="currentColor"/><circle cx="30" cy="50" r="2" fill="currentColor"/><circle cx="10" cy="30" r="2" fill="currentColor"/><circle cx="50" cy="30" r="2" fill="currentColor"/><circle cx="16" cy="16" r="2" fill="currentColor"/><circle cx="44" cy="44" r="2" fill="currentColor"/><circle cx="44" cy="16" r="2" fill="currentColor"/><circle cx="16" cy="44" r="2" fill="currentColor"/></svg>';
    const svgLeaves = '<svg viewBox="0 0 60 60" width="110" height="110" style="opacity:0.4;"><path d="M10 50C10 50 20 10 50 10C50 10 40 30 30 40C20 50 10 50 10 50Z" fill="currentColor"/><path d="M15 45L45 15" stroke="currentColor" stroke-width="1.5" fill="none"/><path d="M25 35C25 35 30 25 40 20" stroke="currentColor" stroke-width="1" fill="none"/><path d="M20 40C20 40 28 32 35 28" stroke="currentColor" stroke-width="1" fill="none"/></svg>';
    const svgSun = '<svg viewBox="0 0 60 60" width="110" height="110" style="opacity:0.4;"><circle cx="30" cy="30" r="12" fill="currentColor"/><g stroke="currentColor" stroke-width="2.5"><line x1="30" y1="3" x2="30" y2="13"/><line x1="30" y1="47" x2="30" y2="57"/><line x1="3" y1="30" x2="13" y2="30"/><line x1="47" y1="30" x2="57" y2="30"/><line x1="11" y1="11" x2="18" y2="18"/><line x1="42" y1="42" x2="49" y2="49"/><line x1="49" y1="11" x2="42" y2="18"/><line x1="18" y1="42" x2="11" y2="49"/></g></svg>';
    const svgFlower = '<svg viewBox="0 0 60 60" width="110" height="110" style="opacity:0.4;"><circle cx="30" cy="18" r="9" fill="currentColor" opacity="0.6"/><circle cx="18" cy="30" r="9" fill="currentColor" opacity="0.6"/><circle cx="42" cy="30" r="9" fill="currentColor" opacity="0.6"/><circle cx="22" cy="42" r="9" fill="currentColor" opacity="0.6"/><circle cx="38" cy="42" r="9" fill="currentColor" opacity="0.6"/><circle cx="30" cy="30" r="6" fill="currentColor"/></svg>';
    const svgHeart = '<svg viewBox="0 0 60 60" width="110" height="110" style="opacity:0.4;"><path d="M30 52C30 52 3 36 3 19C3 10 10 3 19 3C24 3 28 6 30 11C32 6 36 3 41 3C50 3 57 10 57 19C57 36 30 52 30 52Z" fill="currentColor"/></svg>';
    const svgStar = '<svg viewBox="0 0 60 60" width="110" height="110" style="opacity:0.4;"><polygon points="30,3 37,22 57,22 41,35 47,55 30,43 13,55 19,35 3,22 23,22" fill="#f59e0b"/></svg>';
    const svgTree = '<svg viewBox="0 0 60 60" width="110" height="110" style="opacity:0.4;"><polygon points="30,3 8,48 52,48" fill="currentColor"/><rect x="25" y="48" width="10" height="10" fill="currentColor" opacity="0.7"/><circle cx="25" cy="22" r="3" fill="#dc2626" opacity="0.8"/><circle cx="35" cy="30" r="3" fill="#dc2626" opacity="0.8"/><circle cx="28" cy="38" r="3" fill="#dc2626" opacity="0.8"/><polygon points="30,1 32,8 28,8" fill="#f59e0b"/></svg>';
    const svgPumpkin = '<svg viewBox="0 0 60 60" width="110" height="110" style="opacity:0.4;"><ellipse cx="30" cy="36" rx="22" ry="20" fill="currentColor"/><ellipse cx="20" cy="36" rx="10" ry="18" fill="currentColor" opacity="0.8"/><ellipse cx="40" cy="36" rx="10" ry="18" fill="currentColor" opacity="0.8"/><rect x="27" y="8" width="6" height="14" rx="3" fill="#16a34a"/><path d="M30 8C30 8 37 3 43 6" stroke="#16a34a" stroke-width="2.5" fill="none"/></svg>';
    const svgEgg = '<svg viewBox="0 0 60 60" width="110" height="110" style="opacity:0.4;"><ellipse cx="30" cy="32" rx="18" ry="24" fill="currentColor"/><path d="M12 26h36" stroke="white" stroke-width="2.5"/><path d="M12 38h36" stroke="white" stroke-width="2.5"/><circle cx="20" cy="32" r="3" fill="white" opacity="0.7"/><circle cx="30" cy="32" r="3" fill="white" opacity="0.7"/><circle cx="40" cy="32" r="3" fill="white" opacity="0.7"/></svg>';

    // Holidays first (triggers if holiday falls within or adjacent to this week)
    if (weekNear(6, 4)) return { name:'4th of July', banner:'🎆 Happy 4th of July!', headerBg:'#1e3a8a', headerColor:'#fff', cellBg:'#eff6ff', borderColor:'#dc2626', accentBg:'linear-gradient(135deg,#1e3a8a,#dc2626,#1e3a8a)', leftEmoji:'🎆', rightEmoji:'🎇', cornerSvg:svgStar, cornerColor:'#1e3a8a' };
    if (weekNear(9, 31)) return { name:'Halloween', banner:'🎃 Happy Halloween! 👻', headerBg:'#1c1917', headerColor:'#fb923c', cellBg:'#fff7ed', borderColor:'#ea580c', accentBg:'linear-gradient(135deg,#1c1917,#ea580c)', leftEmoji:'🎃', rightEmoji:'👻', cornerSvg:svgPumpkin, cornerColor:'#ea580c' };
    if (weekNear(11, 25)) return { name:'Christmas', banner:'🎄 Merry Christmas! ⛄', headerBg:'#14532d', headerColor:'#fff', cellBg:'#f0fdf4', borderColor:'#dc2626', accentBg:'linear-gradient(135deg,#14532d,#dc2626,#14532d)', leftEmoji:'🎄', rightEmoji:'🎅', cornerSvg:svgTree, cornerColor:'#14532d' };
    if (weekNear(1, 14)) return { name:'Valentines', banner:'💕 Happy Valentine\'s Day! 💝', headerBg:'#831843', headerColor:'#fdf2f8', cellBg:'#fdf2f8', borderColor:'#ec4899', accentBg:'linear-gradient(135deg,#831843,#ec4899)', leftEmoji:'💕', rightEmoji:'💝', cornerSvg:svgHeart, cornerColor:'#ec4899' };
    if (weekNear(2, 17)) return { name:'St Patricks', banner:'☘️ Happy St. Patrick\'s Day! 🌈', headerBg:'#14532d', headerColor:'#fff', cellBg:'#f0fdf4', borderColor:'#16a34a', accentBg:'linear-gradient(135deg,#14532d,#16a34a)', leftEmoji:'☘️', rightEmoji:'🌈', cornerSvg:svgLeaves, cornerColor:'#16a34a' };
    // Thanksgiving (4th Thursday of November)
    if (m === 10 && d >= 18 && d <= 28) return { name:'Thanksgiving', banner:'🦃 Happy Thanksgiving! 🍂', headerBg:'#78350f', headerColor:'#fef3c7', cellBg:'#fffbeb', borderColor:'#d97706', accentBg:'linear-gradient(135deg,#78350f,#d97706)', leftEmoji:'🦃', rightEmoji:'🍂', cornerSvg:svgLeaves, cornerColor:'#d97706' };
    // Easter (approximate - mid April)
    if (m === 3 && d >= 7 && d <= 21) return { name:'Easter', banner:'🐣 Happy Easter! 🌷', headerBg:'#581c87', headerColor:'#faf5ff', cellBg:'#faf5ff', borderColor:'#a855f7', accentBg:'linear-gradient(135deg,#581c87,#a855f7,#ec4899)', leftEmoji:'🐣', rightEmoji:'🐰', cornerSvg:svgEgg, cornerColor:'#a855f7' };
    // Seasons
    if (m >= 5 && m <= 7) return { name:'Summer', banner:'☀️ Summer Fun! 🌊', headerBg:'#1e40af', headerColor:'#fff', cellBg:'#eff6ff', borderColor:'#2563eb', accentBg:'linear-gradient(135deg,#0ea5e9,#2563eb)', leftEmoji:'☀️', rightEmoji:'🌊', cornerSvg:svgSun, cornerColor:'#2563eb' };
    if (m >= 8 && m <= 10) return { name:'Fall', banner:'🍁 Fall Harvest 🌽', headerBg:'#78350f', headerColor:'#fef3c7', cellBg:'#fffbeb', borderColor:'#d97706', accentBg:'linear-gradient(135deg,#92400e,#d97706)', leftEmoji:'🍁', rightEmoji:'🍎', cornerSvg:svgLeaves, cornerColor:'#d97706' };
    if (m >= 11 || m <= 1) return { name:'Winter', banner:'❄️ Winter Wonderland ⛄', headerBg:'#1e3a5f', headerColor:'#e0f2fe', cellBg:'#f0f9ff', borderColor:'#0284c7', accentBg:'linear-gradient(135deg,#1e3a5f,#0284c7)', leftEmoji:'❄️', rightEmoji:'⛄', cornerSvg:svgSnowflakes, cornerColor:'#0284c7' };
    return { name:'Spring', banner:'🌸 Spring is Here! 🐝', headerBg:'#4c1d95', headerColor:'#faf5ff', cellBg:'#fdf4ff', borderColor:'#a855f7', accentBg:'linear-gradient(135deg,#7c3aed,#ec4899)', leftEmoji:'🌸', rightEmoji:'🦋', cornerSvg:svgFlower, cornerColor:'#a855f7' };
}

function printMenus() {
    const dates = [];
    for (let i = 0; i < 5; i++) { const d = new Date(currentWeekStart); d.setDate(d.getDate() + i); dates.push(d); }
    const monthNames = ['January','February','March','April','May','June','July','August','September','October','November','December'];
    const ordinal = n => { const s=['th','st','nd','rd']; const v=n%100; return n+(s[(v-20)%10]||s[v]||s[0]); };
    const startStr = monthNames[currentWeekStart.getMonth()] + ' ' + ordinal(currentWeekStart.getDate());
    const endStr = (dates[4].getMonth()===currentWeekStart.getMonth()?'':monthNames[dates[4].getMonth()]+' ') + ordinal(dates[4].getDate());
    const dateRange = startStr + ' - ' + endStr;
    const theme = getSeasonalTheme(currentWeekStart);

    const sections = [
        { title: 'Preschool', id: 'pfa' },
        { title: 'Birth to Three', id: 'other' }
    ];

    let html = '';
    sections.forEach(sec => {
        html += `<div class="print-sheet" style="border:4px solid ${theme.borderColor};border-radius:12px;padding:10px 16px;position:relative;overflow:hidden;">`;
        // Top corner art - staggered (left higher, right lower)
        html += `<div style="position:absolute;top:12px;left:12px;color:${theme.cornerColor};">${theme.cornerSvg}</div>`;
        html += `<div style="position:absolute;top:35px;right:12px;color:${theme.cornerColor};transform:scaleX(-1);">${theme.cornerSvg}</div>`;
        // Themed banner
        html += `<div style="background:${theme.accentBg};color:white;text-align:center;padding:8px 16px;border-radius:8px;margin-bottom:6px;font-size:16px;font-weight:700;letter-spacing:1px;font-family:'Fredoka',sans-serif;">${theme.banner}</div>`;
        // Header: logo left, centered date+emojis, subtitle below
        html += `<div style="display:flex;align-items:center;margin-bottom:4px;">
            <img src="logo-sm.png" alt="Children of Promise" style="width:120px;height:120px;margin-left:15px;">
            <div style="flex:1;text-align:center;">
                <h1 style="color:${theme.headerBg};font-family:'Dancing Script',cursive;font-size:32px;margin:0;"><span style="font-family:sans-serif;font-size:72px;vertical-align:middle;">${theme.leftEmoji || ''}</span> ${dateRange} <span style="font-family:sans-serif;font-size:72px;vertical-align:middle;">${theme.rightEmoji || ''}</span></h1>
                <div style="font-size:14px;font-weight:700;color:${theme.headerBg};font-family:'Fredoka',sans-serif;margin-top:4px;">${sec.title}</div>
            </div>
        </div>`;
        // Table with themed colors
        html += `<table style="border:2px solid ${theme.borderColor};">`;
        html += `<thead><tr><th style="width:90px;background:${theme.headerBg};color:${theme.headerColor};"></th>`;
        DAYS.forEach(day => html += `<th style="background:${theme.headerBg};color:${theme.headerColor};">${day}</th>`);
        html += '</tr></thead><tbody>';
        MEALS.forEach((meal, mi) => {
            const rowBg = mi % 2 === 0 ? theme.cellBg : '#ffffff';
            html += `<tr><td class="meal-label" style="background:${theme.cellBg};color:${theme.headerBg};border-color:${theme.borderColor};">${meal}</td>`;
            for (let di = 0; di < 5; di++) {
                const el = document.getElementById(sec.id + '_' + di + '_' + meal.replace(/\s/g,''));
                const val = el ? el.value : '';
                if (val === 'CLOSED - Holiday') {
                    html += `<td class="holiday-cell" style="background:${theme.cellBg};border-color:${theme.borderColor};font-size:18px;">🎉</td>`;
                } else {
                    html += `<td style="background:${rowBg};border-color:${theme.borderColor};">${val.replace(/\n/g,'<br>')}</td>`;
                }
            }
            html += '</tr>';
        });
        html += '</tbody></table>';
        // Bottom decorative art - centered row of themed SVGs
        html += `<div style="display:flex;justify-content:space-around;align-items:center;margin-top:4px;padding:2px 40px;">
            <div style="color:${theme.cornerColor};transform:rotate(-15deg);">${theme.cornerSvg}</div>
            <div style="color:${theme.cornerColor};opacity:0.6;transform:scale(0.7);">${theme.cornerSvg}</div>
            <div style="color:${theme.cornerColor};transform:rotate(10deg);">${theme.cornerSvg}</div>
            <div style="color:${theme.cornerColor};opacity:0.6;transform:scale(0.7) rotate(-5deg);">${theme.cornerSvg}</div>
            <div style="color:${theme.cornerColor};transform:rotate(20deg);">${theme.cornerSvg}</div>
        </div>`;
        html += '</div>';
    });

    const printArea = document.getElementById('printArea');
    printArea.innerHTML = html;
    let styleTag = document.getElementById('printPageStyle');
    if (!styleTag) { styleTag = document.createElement('style'); styleTag.id = 'printPageStyle'; document.head.appendChild(styleTag); }
    styleTag.textContent = '@page { size: landscape; margin: 0.3in; }';
    setTimeout(() => window.print(), 200);
}

render();
async function initMenus() {
    await loadMenus();
    applyTemplate(getRotatingTemplateIndex(), false);
}
initMenus();

function applyTemplate(idx, overwrite) {
    ['pfa','other'].forEach(section => {
        const template = TEMPLATES[section][idx];
        DAYS.forEach((day, di) => {
            const dayData = template[day] || {};
            MEALS.forEach(meal => {
                const key = meal.replace(/\s/g,'');
                const el = document.getElementById(`${section}_${di}_${key}`);
                if (el && (overwrite || !el.value)) el.value = dayData[key] || '';
            });
        });
    });
}
</script>
<div id="printArea"></div>
</body>
</html>
