<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ISBE PFA/PI Management – Children Of Promise</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        body { background: linear-gradient(to right, #5585e0 0%, #2563eb 10%, #1e3a8a 100%); min-height: 100vh; }
        .isbe-layout { display:flex;height:calc(100vh - 90px);align-items:flex-start;justify-content:center;padding:20px; }
        .isbe-wrapper { display:flex;max-height:calc(100vh - 130px);width:100%;max-width:1100px; }
        .isbe-sidebar { width:160px;flex-shrink:0;background:rgba(255,255,255,0.12);overflow-y:auto;padding:8px 0;border-radius:12px 0 0 12px; }
        .isbe-sidebar button { display:block;width:100%;text-align:left;padding:14px 16px;border:none;cursor:pointer;background:transparent;transition:background 0.15s; }
        .isbe-sidebar button.active { background:rgba(255,255,255,0.2); }
        .isbe-sidebar button:hover:not(.active) { background:rgba(255,255,255,0.1); }
        .isbe-sidebar button div { font-size:0.82rem;font-weight:700;color:white; }
        .isbe-sidebar button span { font-size:0.68rem;color:rgba(255,255,255,0.6); }
        .isbe-card { background:white;flex:1;display:flex;flex-direction:column;overflow:hidden;border-radius:12px;box-shadow:0 4px 24px rgba(0,0,0,0.2);max-height:calc(100vh - 130px); }
        .isbe-header { padding:12px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px; }
        .isbe-header h2 { font-size:1rem;font-weight:800;color:var(--text);margin:0; }
        .isbe-header span { font-size:0.72rem;color:var(--text-muted); }
        .isbe-grid { overflow:auto;flex:1; }
        table { width:100%;border-collapse:collapse;font-size:0.75rem; }
        thead tr { background:#f8fafc;border-bottom:2px solid var(--border);position:sticky;top:0;z-index:1; }
        th { padding:7px 6px;text-align:center;font-size:0.6rem;font-weight:700;letter-spacing:0.04em;color:var(--text-muted);white-space:nowrap; }
        th.left { text-align:left;padding-left:14px; }
        td { padding:5px 6px;border-bottom:1px solid var(--border);text-align:center;white-space:nowrap; }
        td.left { text-align:left;padding-left:14px; }
        tr:hover { background:#f8fafc; }
        input[type=checkbox] { width:auto;accent-color:var(--primary);cursor:pointer; }
    </style>
</head>
<body>

<header class="site-header">
    <a class="brand-link" href="/staff/">
        <img src="logo-sm.png" alt="Children Of Promise">
        <div class="brand-text">
            <h1>Children Of Promise</h1>
            <p>ISBE PFA/PI Management &nbsp;·&nbsp; Millstadt, IL</p>
        </div>
    </a>
    <a class="header-back" href="/staff/">← Staff Portal</a>
</header>

<div class="isbe-layout">
    <div class="isbe-wrapper">

        <!-- LEFT SIDEBAR -->
        <div class="isbe-sidebar">
            <button class="active" id="btnPFA" onclick="setProgram('PFA')">
                <div>📋 PFA Roster</div>
                <span id="pfaCount"></span>
            </button>
            <button id="btnPI" onclick="setProgram('PI')">
                <div>📋 PI Roster</div>
                <span id="piCount"></span>
            </button>
        </div>

        <!-- RIGHT CARD -->
        <div class="isbe-card">
            <div class="isbe-header">
                <h2 id="isbeTitle">PFA Roster</h2>
                <span id="isbeCount"></span>
            </div>
            <div class="isbe-grid">
                <table>
                    <thead>
                        <tr>
                            <th class="left" style="min-width:120px;">Student</th>
                            <th style="width:80px;">Room</th>
                            <th>Permission Slip</th>
                            <th>Parent Interview</th>
                            <th>Proof of Income</th>
                            <th>Beg ASQ</th>
                            <th>Beg ASE</th>
                            <th>Mid Year Report</th>
                            <th>End ASQ</th>
                            <th>End ASE</th>
                            <th>End Year Report</th>
                        </tr>
                    </thead>
                    <tbody id="isbeBody">
                        <tr><td colspan="11" style="text-align:center;padding:40px;color:var(--text-muted);">Loading...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>

    </div>
</div>

<script>
const AUTH = 'Basic ' + btoa(':cofpadmin');
function apiFetch(url, opts = {}) {
    opts.headers = Object.assign({ 'Authorization': AUTH, 'Content-Type': 'application/json' }, opts.headers || {});
    return fetch(url, opts);
}

let students = [];
let classrooms = [];
let trackingData = {};
let activeProgram = 'PFA';

async function init() {
    const [sRes, cRes, tRes] = await Promise.all([
        apiFetch('/api/students'),
        apiFetch('/api/classrooms'),
        apiFetch('/api/isbe-tracking')
    ]);
    students = await sRes.json();
    classrooms = await cRes.json();
    const tData = await tRes.json();
    tData.forEach(t => { trackingData[t.StudentId] = t; });
    // Update counts
    const pfaCount = students.filter(s => s.PFA_PI_na === 'PFA' && (s.Active === 'Yes' || s.Active === 'YES')).length;
    const piCount = students.filter(s => s.PFA_PI_na === 'PI' && (s.Active === 'Yes' || s.Active === 'YES')).length;
    document.getElementById('pfaCount').textContent = pfaCount + ' students';
    document.getElementById('piCount').textContent = piCount + ' students';
    renderRoster();
}

function getRoom(roomNum) {
    const r = classrooms.find(c => String(c.RoomNumber) === String(roomNum));
    return r ? r.Room : roomNum;
}

function setProgram(prog) {
    activeProgram = prog;
    document.getElementById('btnPFA').classList.toggle('active', prog === 'PFA');
    document.getElementById('btnPI').classList.toggle('active', prog === 'PI');
    document.getElementById('isbeTitle').textContent = prog + ' Roster';
    renderRoster();
}

const FIELDS = ['PermissionSlip','ParentInterview','ProofOfIncome','BegASQ','BegASE','MidYearReport','EndASQ','EndASE','EndYearReport'];

function renderRoster() {
    const roster = students.filter(s => s.PFA_PI_na === activeProgram && (s.Active === 'Yes' || s.Active === 'YES'));
    document.getElementById('isbeCount').textContent = roster.length + ' students';
    const tbody = document.getElementById('isbeBody');
    if (!roster.length) { tbody.innerHTML = '<tr><td colspan="11" style="text-align:center;padding:40px;color:var(--text-muted);">No students in this program.</td></tr>'; return; }

    tbody.innerHTML = roster.map(s => {
        const t = trackingData[s.Id] || {};
        return `<tr>
            <td class="left" style="font-weight:600;font-size:0.73rem;">${s.Last_Name}, ${s.First_Name}</td>
            <td style="font-size:0.7rem;color:var(--text-muted);">${getRoom(s.RoomNumber)}</td>
            ${FIELDS.map(f => `<td><input type="checkbox" ${t[f]?'checked':''} onchange="saveField(${s.Id},'${f}',this.checked)"></td>`).join('')}
        </tr>`;
    }).join('');
}

async function saveField(studentId, field, value) {
    try {
        const res = await apiFetch('/api/isbe-tracking', {
            method: 'PUT',
            body: JSON.stringify({ studentId, field, value: value ? 1 : 0 })
        });
        const data = await res.json();
        if (data.success) {
            if (!trackingData[studentId]) trackingData[studentId] = {};
            trackingData[studentId][field] = value ? 1 : 0;
        }
    } catch (e) { console.error('Save failed', e); }
}

init();
</script>
</body>
</html>
