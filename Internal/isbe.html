<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ISBE PFA/PI Management – Children Of Promise</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .mode-toggle-bar { background:linear-gradient(to right,#5585e0 0%,#2563eb 10%,#1e3a8a 100%);padding:14px 24px 14px;display:flex;justify-content:center;border-bottom:none; }
        .mode-toggle { display:inline-flex;background:rgba(255,255,255,0.15);border-radius:10px;padding:4px;gap:4px;white-space:nowrap; }
        .toggle-btn { padding:10px 20px;border:none;border-radius:7px;font-size:0.82rem;font-weight:700;cursor:pointer;color:rgba(255,255,255,0.8);background:transparent;transition:background 0.18s,color 0.18s; }
        .toggle-btn.active { background:white;color:var(--primary);box-shadow:0 1px 6px rgba(0,0,0,0.12); }
        .isbe-container { display:flex;height:calc(100vh - 140px);background:linear-gradient(to right,#5585e0 0%,#2563eb 10%,#1e3a8a 100%);align-items:flex-start;justify-content:center;padding:20px; }
        .isbe-card { background:white;flex:1;display:flex;flex-direction:column;overflow:hidden;border-radius:12px;box-shadow:0 4px 24px rgba(0,0,0,0.2);max-height:calc(100vh - 180px);max-width:1100px; }
        .isbe-header { padding:14px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px; }
        .isbe-header h2 { font-size:1rem;font-weight:800;color:var(--text);margin:0; }
        .isbe-grid { overflow:auto;flex:1; }
        table { width:100%;border-collapse:collapse;font-size:0.75rem; }
        thead tr { background:#f8fafc;border-bottom:2px solid var(--border);position:sticky;top:0;z-index:1; }
        th { padding:8px 8px;text-align:center;font-size:0.6rem;font-weight:700;text-transform:uppercase;letter-spacing:0.05em;color:var(--text-muted); }
        th:first-child { text-align:left;padding-left:14px; }
        td { padding:6px 8px;border-bottom:1px solid var(--border);text-align:center; }
        td:first-child { text-align:left;padding-left:14px;font-weight:600; }
        tr:hover { background:#f8fafc; }
        input[type=checkbox] { width:auto;accent-color:var(--primary); }
    </style>
</head>
<body>

<header class="site-header">
    <a class="brand-link" href="/staff/">
        <img src="logo-sm.png" alt="Children Of Promise">
        <div class="brand-text">
            <h1>Children Of Promise</h1>
            <p>ISBE PFA/PI Management &nbsp;·&nbsp; Millstadt, IL</p>
        </div>
    </a>
    <a class="header-back" href="/staff/">← Staff Portal</a>
</header>

<div class="mode-toggle-bar">
    <div class="mode-toggle">
        <button class="toggle-btn active" id="btnPFA" onclick="setProgram('PFA')">PFA Roster</button>
        <button class="toggle-btn" id="btnPI" onclick="setProgram('PI')">PI Roster</button>
    </div>
</div>

<div class="isbe-container">
    <div class="isbe-card">
        <div class="isbe-header">
            <h2 id="isbeTitle">PFA Roster</h2>
            <span style="font-size:0.75rem;color:var(--text-muted);" id="isbeCount"></span>
        </div>
        <div class="isbe-grid">
            <table>
                <thead>
                    <tr>
                        <th style="min-width:150px;">Student</th>
                        <th style="width:50px;">Room</th>
                        <th style="width:65px;">Permission Slip</th>
                        <th style="width:65px;">Parent Interview</th>
                        <th style="width:55px;">Beg ASQ</th>
                        <th style="width:55px;">Beg ASE</th>
                        <th style="width:65px;">Mid Year Report</th>
                        <th style="width:55px;">End ASQ</th>
                        <th style="width:55px;">End ASE</th>
                        <th style="width:65px;">End Year Report</th>
                    </tr>
                </thead>
                <tbody id="isbeBody">
                    <tr><td colspan="10" style="text-align:center;padding:40px;color:var(--text-muted);">Loading...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script>
const AUTH = 'Basic ' + btoa(':cofpadmin');
function apiFetch(url, opts = {}) {
    opts.headers = Object.assign({ 'Authorization': AUTH, 'Content-Type': 'application/json' }, opts.headers || {});
    return fetch(url, opts);
}

let students = [];
let classrooms = [];
let trackingData = {};
let activeProgram = 'PFA';

async function init() {
    const [sRes, cRes, tRes] = await Promise.all([
        apiFetch('/api/students'),
        apiFetch('/api/classrooms'),
        apiFetch('/api/isbe-tracking')
    ]);
    students = await sRes.json();
    classrooms = await cRes.json();
    const tData = await tRes.json();
    // Index tracking by StudentId
    tData.forEach(t => { trackingData[t.StudentId] = t; });
    renderRoster();
}

function getRoom(roomNum) {
    const r = classrooms.find(c => String(c.RoomNumber) === String(roomNum));
    return r ? r.Room : roomNum;
}

function setProgram(prog) {
    activeProgram = prog;
    document.getElementById('btnPFA').classList.toggle('active', prog === 'PFA');
    document.getElementById('btnPI').classList.toggle('active', prog === 'PI');
    document.getElementById('isbeTitle').textContent = prog + ' Roster';
    renderRoster();
}

const FIELDS = ['PermissionSlip','ParentInterview','BegASQ','BegASE','MidYearReport','EndASQ','EndASE','EndYearReport'];

function renderRoster() {
    const roster = students.filter(s => s.PFA_PI_na === activeProgram && (s.Active === 'Yes' || s.Active === 'YES'));
    document.getElementById('isbeCount').textContent = roster.length + ' students';
    const tbody = document.getElementById('isbeBody');
    if (!roster.length) { tbody.innerHTML = '<tr><td colspan="10" style="text-align:center;padding:40px;color:var(--text-muted);">No students in this program.</td></tr>'; return; }

    tbody.innerHTML = roster.map((s, i) => {
        const t = trackingData[s.Id] || {};
        return `<tr>
            <td>${s.Last_Name}, ${s.First_Name}</td>
            <td style="text-align:center;font-size:0.7rem;">${getRoom(s.RoomNumber)}</td>
            ${FIELDS.map(f => `<td><input type="checkbox" ${t[f]?'checked':''} onchange="saveField(${s.Id},'${f}',this.checked)"></td>`).join('')}
        </tr>`;
    }).join('');
}

async function saveField(studentId, field, value) {
    try {
        const res = await apiFetch('/api/isbe-tracking', {
            method: 'PUT',
            body: JSON.stringify({ studentId, field, value: value ? 1 : 0 })
        });
        const data = await res.json();
        if (data.success) {
            if (!trackingData[studentId]) trackingData[studentId] = {};
            trackingData[studentId][field] = value ? 1 : 0;
        }
    } catch (e) { console.error('Save failed', e); }
}

init();
</script>
</body>
</html>
