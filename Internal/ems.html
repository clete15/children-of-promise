<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EMS – Children Of Promise</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        /* ── CENTERED LAYOUT ── */
        #emsMode {
            display: block;
            padding: 0;
        }

        /* ── STUDENT NAV ARROWS ── */
        .student-nav-arrow {
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 700;
            transition: background 0.15s, transform 0.15s;
            flex-shrink: 0;
        }
        .student-nav-arrow:hover:not(:disabled) { background: var(--primary-dark, #1d4ed8); transform: translateY(-1px); }
        .student-nav-arrow:disabled { background: #e2e8f0; color: #94a3b8; cursor: not-allowed; }
        .student-nav-arrow .arrow-icon { font-size: 1rem; }

        .form-center {
            flex: 1;
            min-width: 0;
        }

        /* ── MODE TOGGLE ── */
        .mode-toggle-bar {
            background: linear-gradient(to right, #5585e0 0%, #2563eb 10%, #1e3a8a 100%);
            padding: 14px 24px 0;
            display: flex;
            justify-content: center;
            border-bottom: none;
        }
        .mode-toggle {
            display: inline-flex;
            background: rgba(255,255,255,0.15);
            border-radius: 10px;
            padding: 4px;
            gap: 4px;
            white-space: nowrap;
        }
        .toggle-btn { color: rgba(255,255,255,0.8) !important; }
        .toggle-btn.active { background: white !important; color: var(--primary) !important; }

        #emsMode, #rosterMode {
            background: linear-gradient(to right, #5585e0 0%, #2563eb 10%, #1e3a8a 100%);
            min-height: calc(100vh - 120px);
            padding-top: 0;
        }
        #emsMode { padding: 0; }
        .student-nav-arrow { background: var(--primary); border: none; color: white; }
        .student-nav-arrow:hover:not(:disabled) { background: var(--primary-dark, #1d4ed8) !important; }
        .student-nav-arrow:disabled { background: #e2e8f0; color: #94a3b8; cursor: not-allowed; }
    </style>
</head>
<body>

<header class="site-header">
    <a class="brand-link" href="index.html">
        <img src="logo-sm.png" alt="Children Of Promise">
        <div class="brand-text">
            <h1>Children Of Promise</h1>
            <p>Enrollment Management System &nbsp;·&nbsp; Millstadt, IL</p>
        </div>
    </a>
    <a class="header-back" href="index.html">← Staff Portal</a>
</header>

<!-- MODE TOGGLE -->
<div class="mode-toggle-bar">
    <div class="mode-toggle">
        <button class="toggle-btn active" id="btnEmsMode" onclick="setMode('ems')">
            <span class="toggle-icon">📋</span> EMS
        </button>
        <button class="toggle-btn" id="btnRosterMode" onclick="setMode('roster')">
            <span class="toggle-icon">🏫</span> Room Roster
        </button>
    </div>
</div>

<!-- ══════════════════════════════════════════
     EMS MODE (View / Edit / Add)
══════════════════════════════════════════ -->
<div id="emsMode" style="display:block;">
    <div style="display:flex;height:calc(100vh - 140px);background:linear-gradient(to right, #5585e0 0%, #2563eb 10%, #1e3a8a 100%);align-items:flex-start;justify-content:center;padding:20px;">

        <!-- SIDEBAR + FORM UNIT centered together -->
        <div style="display:flex;border-radius:12px;overflow:hidden;box-shadow:0 4px 24px rgba(0,0,0,0.2);max-height:calc(100vh - 180px);width:100%;max-width:960px;">

            <!-- LEFT SIDEBAR (room filters) -->
            <div id="viewSidebar" style="width:180px;flex-shrink:0;background:rgba(255,255,255,0.12);overflow-y:auto;padding:8px 0;"></div>

            <!-- RIGHT: STUDENT NAV + FORM -->
            <div style="background:white;flex:1;display:flex;flex-direction:column;overflow:hidden;">

                <!-- TOP NAV BAR: arrows + counter + new button -->
                <div style="padding:12px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;">
                    <button class="student-nav-arrow" id="btnPrev" onclick="navigate(-1)" disabled style="width:36px;height:36px;min-height:36px;border-radius:6px;font-size:0.85rem;">
                        <span class="arrow-icon">◀</span>
                    </button>
                    <div style="flex:1;text-align:center;">
                        <div id="viewStudentName" style="font-size:1rem;font-weight:800;color:var(--text);"></div>
                        <div id="viewRecordCounter" style="font-size:0.72rem;color:var(--text-muted);margin-top:2px;"></div>
                    </div>
                    <button class="student-nav-arrow" id="btnNext" onclick="navigate(1)" disabled style="width:36px;height:36px;min-height:36px;border-radius:6px;font-size:0.85rem;">
                        <span class="arrow-icon">▶</span>
                    </button>
                    <button class="btn btn-save" id="btnNewStudent" onclick="startNewStudent()" style="margin-left:12px;padding:8px 14px;font-size:0.78rem;white-space:nowrap;">➕ New</button>
                </div>

                <!-- SCROLLABLE FORM -->
                <div style="overflow-y:auto;padding:16px 20px;">
                    <div class="form-container">

                <!-- Identity -->
                <div class="card">
                    <div class="card-title">Student Identity</div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>First Name <span class="required">*</span></label>
                            <input type="text" id="firstName">
                        </div>
                        <div class="form-group">
                            <label>Last Name <span class="required">*</span></label>
                            <input type="text" id="lastName">
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Birth Date</label>
                            <input type="date" id="birthDate" onchange="calcDaysOld()">
                        </div>
                        <div class="form-group">
                            <label>Start Date</label>
                            <input type="date" id="startDate">
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>City / Town</label>
                            <input type="text" id="cityTown">
                        </div>
                        <div class="form-group">
                            <label>Days Old</label>
                            <input type="number" id="daysOld" readonly>
                        </div>
                    </div>
                </div>

                <!-- Enrollment -->
                <div class="card">
                    <div class="card-title">Enrollment Details</div>
                    <div class="form-group">
                        <label>Room</label>
                        <select id="roomNumber"></select>
                    </div>
                    <div class="form-group">
                        <label>Active</label>
                        <select id="active">
                            <option value="Yes">Yes</option>
                            <option value="No">No</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Pay Type</label>
                        <select id="category">
                            <option value="">-- Select --</option>
                            <option>Paid</option>
                            <option>CCAP</option>
                            <option value="Half Price">Half Price</option>
                            <option>Free</option>
                            <option>Foster</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Days Attending</label>
                        <div class="checkbox-grid">
                            <div class="checkbox-item"><input type="checkbox" id="monday"><label for="monday">Mon</label></div>
                            <div class="checkbox-item"><input type="checkbox" id="tuesday"><label for="tuesday">Tue</label></div>
                            <div class="checkbox-item"><input type="checkbox" id="wednesday"><label for="wednesday">Wed</label></div>
                            <div class="checkbox-item"><input type="checkbox" id="thursday"><label for="thursday">Thu</label></div>
                            <div class="checkbox-item"><input type="checkbox" id="friday"><label for="friday">Fri</label></div>
                        </div>
                    </div>
                </div>

                <!-- Flags -->
                <div class="card" style="grid-column: 1 / -1;">
                    <div class="card-title">Program Flags</div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Program Type</label>
                            <select id="pfaPiNa">
                                <option value="">-- Select --</option>
                                <option value="PFA">PFA</option>
                                <option value="PI">PI</option>
                                <option value="INCCRA">INCCRA</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Food Program</label>
                            <input type="text" id="frpFood" readonly style="background:#f8fafc;font-weight:700;">
                        </div>
                        <div class="form-group" style="display:flex;align-items:flex-end;gap:16px;padding-bottom:2px;">
                            <div class="checkbox-item"><input type="checkbox" id="iep"><label for="iep">IEP</label></div>
                            <div class="checkbox-item"><input type="checkbox" id="military"><label for="military">Military</label></div>
                        </div>
                    </div>
                    <div class="form-group" style="margin-top:8px;">
                        <label>Public Benefits</label>
                        <div class="checkbox-grid">
                            <div class="checkbox-item"><input type="checkbox" id="benWIC" onchange="calcFRP('householdIncome','householdSize','frpFood','')"><label for="benWIC">WIC</label></div>
                            <div class="checkbox-item"><input type="checkbox" id="benMedicaid" onchange="calcFRP('householdIncome','householdSize','frpFood','')"><label for="benMedicaid">Medicaid</label></div>
                            <div class="checkbox-item"><input type="checkbox" id="benSNAP" onchange="calcFRP('householdIncome','householdSize','frpFood','')"><label for="benSNAP">SNAP</label></div>
                            <div class="checkbox-item"><input type="checkbox" id="benTANF" onchange="calcFRP('householdIncome','householdSize','frpFood','')"><label for="benTANF">TANF</label></div>
                            <div class="checkbox-item"><input type="checkbox" id="benCCAP" onchange="calcFRP('householdIncome','householdSize','frpFood','')"><label for="benCCAP">CCAP</label></div>
                        </div>
                    </div>
                </div>

                <!-- Income & Proof -->
                <div class="card" style="grid-column: 1 / -1;">
                    <div class="card-title">Household Income</div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Annual Household Income</label>
                            <input type="number" id="householdIncome" placeholder="e.g. 42000" max="100000" min="0" oninput="calcFRP('householdIncome','householdSize','frpFood','')">
                        </div>
                        <div class="form-group">
                            <label>Household Size</label>
                            <input type="number" id="householdSize" placeholder="e.g. 4" min="1" max="15" oninput="calcFRP('householdIncome','householdSize','frpFood','')">
                        </div>
                        <div class="form-group" style="display:flex;align-items:flex-end;padding-bottom:2px;">
                            <div class="checkbox-item"><input type="checkbox" id="proofOfIncome"><label for="proofOfIncome">Proof of Income</label></div>
                        </div>
                    </div>
                </div>

                <!-- Actions -->
                <div class="actions">
                    <button class="btn btn-secondary" id="btnCancel" onclick="cancelNew()" style="display:none;">Cancel</button>
                    <button class="btn btn-update" id="btnUpdate" onclick="updateStudent()">Update Student</button>
                    <button class="btn btn-save" id="btnSaveNew" onclick="saveStudent()" style="display:none;">Save New Student</button>
                </div>

                    </div>
                </div>

            </div>
        </div>
    </div>
</div>

<!-- ══════════════════════════════════════════
     ROOM ROSTER MODE
══════════════════════════════════════════ -->
<div id="rosterMode" style="display:none;">
    <div style="display:flex;height:calc(100vh - 140px);background:linear-gradient(to right, #5585e0 0%, #2563eb 10%, #1e3a8a 100%);align-items:flex-start;justify-content:center;padding:20px;">

        <!-- SIDEBAR + CARD UNIT centered together -->
        <div style="display:flex;border-radius:12px;overflow:hidden;box-shadow:0 4px 24px rgba(0,0,0,0.2);max-height:calc(100vh - 180px);">

            <!-- LEFT SIDEBAR -->
            <div id="rosterSidebar" style="width:180px;flex-shrink:0;background:rgba(255,255,255,0.12);overflow-y:auto;padding:8px 0;"></div>

            <!-- WHITE TABLE CARD -->
            <div style="background:white;display:flex;flex-direction:column;overflow:hidden;">
                <div style="padding:14px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:16px;">
                    <div id="rosterRoomTitle" style="font-size:1rem;font-weight:800;color:var(--text);"></div>
                    <div id="rosterRoomTeacher" style="font-size:0.75rem;color:var(--danger);font-weight:600;flex:1;"></div>
                    <label style="display:flex;align-items:center;gap:6px;font-size:0.75rem;font-weight:600;color:var(--text-muted);cursor:pointer;white-space:nowrap;">
                        <input type="checkbox" id="rosterActiveOnly" checked onchange="renderRosterRoom()" style="width:auto;accent-color:var(--primary);">
                        Active only
                    </label>
                </div>
                <div id="rosterStudentGrid" style="overflow:auto;"></div>
            </div>

        </div>
    </div>
</div>



<script>
const AUTH = 'Basic ' + btoa(':cofpadmin');

function apiFetch(url, opts = {}) {
    opts.headers = Object.assign({ 'Authorization': AUTH, 'Content-Type': 'application/json' }, opts.headers || {});
    return fetch(url, opts);
}

let students = [];
let classrooms = [];
let filtered = [];
let currentIndex = 0;
let activeRoom = 'All';
let currentMode = 'ems';
let isNewMode = false;
let waitlistId = null;

async function init() {
    await Promise.all([loadClassrooms(), loadStudents()]);
    // Check if redirected from waiting list
    if (new URLSearchParams(window.location.search).get('enroll') === '1') {
        const data = sessionStorage.getItem('enrollFromWaitlist');
        if (data) {
            const d = JSON.parse(data);
            waitlistId = d.waitlistId;
            startNewStudent();
            setTimeout(() => {
                // Pre-fill available fields
                document.getElementById('firstName').value  = d.firstName || '';
                document.getElementById('lastName').value   = d.lastName || '';
                document.getElementById('cityTown').value   = d.cityTown || '';
                document.getElementById('birthDate').value  = d.birthDate || '';
                document.getElementById('iep').checked      = !!d.iep;
                document.getElementById('military').checked = !!d.military;
                document.getElementById('householdIncome').value = d.householdIncome || '';
                document.getElementById('householdSize').value = d.householdSize || '';
                // Set public benefits
                if (d.publicBenefits) {
                    const ben = d.publicBenefits.toLowerCase();
                    if (ben.includes('wic'))      document.getElementById('benWIC').checked = true;
                    if (ben.includes('medicaid')) document.getElementById('benMedicaid').checked = true;
                    if (ben.includes('snap'))     document.getElementById('benSNAP').checked = true;
                    if (ben.includes('tanf'))     document.getElementById('benTANF').checked = true;
                    if (ben.includes('ccap'))     document.getElementById('benCCAP').checked = true;
                }
                // Set pay type based on foster
                if (d.fosterAdopted) document.getElementById('category').value = 'Foster';
                // Auto-calculate food program AFTER benefits are set
                calcFRP('householdIncome','householdSize','frpFood','');
                // Highlight empty fields that need to be filled
                highlightEmptyFields();
                showNotification(`Pre-filling from waiting list: ${d.firstName} ${d.lastName}. Complete highlighted fields.`, 'info');
            }, 300);
        }
    }
}

function highlightEmptyFields() {
    const fieldsToCheck = ['firstName','lastName','birthDate','startDate','roomNumber','category','pfaPiNa'];
    fieldsToCheck.forEach(id => {
        const el = document.getElementById(id);
        if (el && !el.value) {
            el.style.background = '#fffbeb';
            el.style.borderColor = '#f59e0b';
            el.addEventListener('change', function handler() {
                if (this.value) { this.style.background = ''; this.style.borderColor = ''; this.removeEventListener('change', handler); }
            });
            el.addEventListener('input', function handler() {
                if (this.value) { this.style.background = ''; this.style.borderColor = ''; this.removeEventListener('input', handler); }
            });
        }
    });
}

function startNewStudent() {
    isNewMode = true;
    clearForm();
    document.getElementById('viewStudentName').textContent = 'New Student';
    document.getElementById('viewRecordCounter').textContent = '';
    document.getElementById('btnUpdate').style.display = 'none';
    document.getElementById('btnSaveNew').style.display = '';
    document.getElementById('btnCancel').style.display = '';
    document.getElementById('btnPrev').disabled = true;
    document.getElementById('btnNext').disabled = true;
    document.getElementById('btnNewStudent').disabled = true;
}

function cancelNew() {
    isNewMode = false;
    waitlistId = null;
    // Clear any yellow highlights
    document.querySelectorAll('[style*="fffbeb"]').forEach(el => { el.style.background = ''; el.style.borderColor = ''; });
    document.getElementById('btnUpdate').style.display = '';
    document.getElementById('btnSaveNew').style.display = 'none';
    document.getElementById('btnCancel').style.display = 'none';
    document.getElementById('btnNewStudent').disabled = false;
    // Remove enroll query param
    if (window.location.search) history.replaceState(null, '', window.location.pathname);
    sessionStorage.removeItem('enrollFromWaitlist');
    applyFilter();
}

async function loadClassrooms() {
    try {
        const res = await apiFetch('/api/classrooms');
        classrooms = await res.json();
        populateRoomDropdowns();
    } catch (e) {
        showNotification('Failed to load classrooms', 'error');
    }
}

async function loadStudents() {
    try {
        const res = await apiFetch('/api/students');
        students = await res.json();
        buildRoomNav();
        applyFilter();
        if (currentMode === 'roster') buildRoster();
    } catch (e) {
        showNotification('Failed to load students', 'error');
    }
}

function getClassroom(roomNumber) {
    return classrooms.find(r => String(r.RoomNumber) === String(roomNumber));
}

function populateRoomDropdowns() {
    const opts = classrooms.map(r =>
        `<option value="${r.RoomNumber}">${r.Room} — (${r.TeacherDescription})</option>`
    ).join('');
    document.getElementById('roomNumber').innerHTML = opts;
}

function updateRoomHint(selectId, hintId) {
    const val = document.getElementById(selectId).value;
    const hint = document.getElementById(hintId);
    const cr = getClassroom(val);
    hint.textContent = cr ? cr.TeacherDescription : '';
}

// ── ROOM NAV ──
let roomList = []; // ['All', roomNumber, roomNumber, ...]
let activeRoomIndex = 0;
let rosterStudents = [];

function buildRoomNav() {
    roomList = ['All', ...classrooms.map(r => r.RoomNumber)];
    buildViewSidebar();
    updateRoomNavDisplay();
}

function buildViewSidebar() {
    const sidebar = document.getElementById('viewSidebar');
    if (!sidebar) return;
    const sidebarRooms = ['All', ...classrooms.map(r => r.RoomNumber)];
    sidebar.innerHTML = sidebarRooms.map(rn => {
        const cr = rn === 'All' ? null : getClassroom(rn);
        const label = rn === 'All' ? 'All Rooms' : (cr ? cr.Room : rn);
        const count = rn === 'All' ? students.length : students.filter(s => String(s.RoomNumber) === String(rn)).length;
        const isActive = String(activeRoom) === String(rn);
        return `<button onclick="setRoomFilter('${rn}')"
            style="display:block;width:100%;text-align:left;padding:10px 16px;border:none;cursor:pointer;
            background:${isActive?'rgba(255,255,255,0.2)':'transparent'};
            border-left:3px solid ${isActive?'white':'transparent'};
            transition:background 0.15s;"
            onmouseover="if(!${isActive})this.style.background='rgba(255,255,255,0.1)'"
            onmouseout="if(!${isActive})this.style.background='transparent'">
            <div style="font-size:0.82rem;font-weight:700;color:white;">${label}</div>
            <div style="font-size:0.68rem;color:rgba(255,255,255,0.6);margin-top:2px;">${count} student${count!==1?'s':''}</div>
        </button>`;
    }).join('');
}

function navigateRoom(dir) {
    activeRoomIndex = (activeRoomIndex + dir + roomList.length) % roomList.length;
    activeRoom = roomList[activeRoomIndex];
    buildViewSidebar();
    updateRoomNavDisplay();
    applyFilter();
}

function updateRoomNavDisplay() {
    // Update the student name and counter in the top bar
    const nameEl = document.getElementById('viewStudentName');
    const counterEl = document.getElementById('viewRecordCounter');
    if (nameEl && counterEl) {
        if (filtered.length > 0 && filtered[currentIndex]) {
            const s = filtered[currentIndex];
            nameEl.textContent = `${s.First_Name} ${s.Last_Name}`;
            counterEl.textContent = `${currentIndex + 1} of ${filtered.length}`;
        } else {
            nameEl.textContent = 'No students';
            counterEl.textContent = '';
        }
    }
}

function setRoomFilter(room) {
    activeRoom = room;
    activeRoomIndex = roomList.indexOf(room);
    if (activeRoomIndex < 0) activeRoomIndex = 0;
    buildViewSidebar();
    updateRoomNavDisplay();
    applyFilter();
}

function applyFilter() {
    filtered = activeRoom === 'All'
        ? [...students]
        : students.filter(s => String(s.RoomNumber) === String(activeRoom));
    currentIndex = 0;
    if (filtered.length > 0 && !isNewMode) loadRecord(0);
    else if (!isNewMode) clearForm();
    updateNavButtons();
    updateRoomNavDisplay();
}

function navigate(dir) {
    if (isNewMode) return;
    currentIndex = Math.max(0, Math.min(filtered.length - 1, currentIndex + dir));
    loadRecord(currentIndex);
    updateNavButtons();
    updateRoomNavDisplay();
}

function updateNavButtons() {
    if (isNewMode) {
        document.getElementById('btnPrev').disabled = true;
        document.getElementById('btnNext').disabled = true;
        return;
    }
    document.getElementById('btnPrev').disabled = currentIndex <= 0;
    document.getElementById('btnNext').disabled = currentIndex >= filtered.length - 1;
}

function loadRecord(i) {
    const s = filtered[i];
    if (!s) return;
    document.getElementById('firstName').value   = s.First_Name || '';
    document.getElementById('lastName').value    = s.Last_Name || '';
    document.getElementById('birthDate').value   = formatDateInput(s.Birth_date);
    document.getElementById('startDate').value   = formatDateInput(s.Start_Date);
    document.getElementById('cityTown').value    = s.City_Town || '';
    document.getElementById('daysOld').value     = s.Days_Old || '';
    calcDaysOld();
    document.getElementById('roomNumber').value  = s.RoomNumber || '';
    document.getElementById('active').value      = isTruthy(s.Active) ? 'Yes' : 'No';
    // Normalize legacy pay type values
    const rawCat = (s.Category || '').trim();
    const catUp = rawCat.toUpperCase();
    let normalizedCategory = rawCat;
    if (catUp === 'CHASI' || catUp === 'CHASI' || catUp === 'CCAP') normalizedCategory = 'CCAP';
    else if (catUp === 'DCFS') normalizedCategory = 'Foster';
    else if (rawCat === '1/2 price' || catUp === 'HALF PRICE') normalizedCategory = 'Half Price';
    else if (catUp === 'STAFF') normalizedCategory = 'Free';
    else if (catUp === 'PAID') normalizedCategory = 'Paid';
    else if (catUp === 'FOSTER') normalizedCategory = 'Foster';
    document.getElementById('category').value    = normalizedCategory;
    document.getElementById('monday').checked    = isTruthy(s.Monday);
    document.getElementById('tuesday').checked   = isTruthy(s.Tuesday);
    document.getElementById('wednesday').checked = isTruthy(s.Wednesday);
    document.getElementById('thursday').checked  = isTruthy(s.Thursday);
    document.getElementById('friday').checked    = isTruthy(s.Friday);
    document.getElementById('pfaPiNa').value     = s.PFA_PI_na || '';
    document.getElementById('frpFood').value     = s.F_R_P_Food || '';
    document.getElementById('iep').checked       = isTruthy(s.IEP);
    document.getElementById('military').checked  = isTruthy(s.Military);
    document.getElementById('householdIncome').value = s.HouseholdIncome || '';
    document.getElementById('householdSize').value = s.HouseholdSize || '';
    // Auto-calc food program
    calcFRP('householdIncome','householdSize','frpFood','');
    // Public benefits
    const ben = s.PublicBenefits || '';
    document.getElementById('benWIC').checked     = ben.includes('WIC');
    document.getElementById('benMedicaid').checked = ben.includes('Medicaid');
    document.getElementById('benSNAP').checked    = ben.includes('SNAP');
    document.getElementById('benTANF').checked    = ben.includes('TANF');
    document.getElementById('benCCAP').checked    = ben.includes('CCAP');
    // Proof of income checkbox
    document.getElementById('proofOfIncome').checked = (s.ProofOfIncomeUploaded === '1' || s.ProofOfIncomeUploaded === 1);
}

function isTruthy(v) {
    if (v === true || v === 1 || v === '1') return true;
    if (typeof v === 'string') return v.toLowerCase() === 'yes';
    return false;
}

function formatDateInput(val) {
    if (!val) return '';
    const d = new Date(val);
    if (isNaN(d)) return '';
    return d.toISOString().split('T')[0];
}

function clearForm() {
    ['firstName','lastName','birthDate','startDate','cityTown','daysOld','householdIncome','householdSize'].forEach(id => document.getElementById(id).value = '');
    ['monday','tuesday','wednesday','thursday','friday','iep','military','benWIC','benMedicaid','benSNAP','benTANF','benCCAP','proofOfIncome'].forEach(id => document.getElementById(id).checked = false);
    document.getElementById('active').value = 'Yes';
    document.getElementById('category').value = '';
    document.getElementById('pfaPiNa').value = '';
    document.getElementById('frpFood').value = '';
}

async function updateStudent() {
    const s = filtered[currentIndex];
    if (!s) return showNotification('No student selected', 'error');
    const btn = document.getElementById('btnUpdate');
    btn.disabled = true; btn.textContent = 'Saving…';
    const body = buildBody('');
    try {
        const res = await apiFetch(`/api/students/${encodeURIComponent(s.First_Name)}/${encodeURIComponent(s.Last_Name)}`, {
            method: 'PUT', body: JSON.stringify(body)
        });
        const data = await res.json();
        if (data.success) { showNotification('Student updated successfully', 'success'); await loadStudents(); }
        else showNotification('Update failed: ' + (data.error || 'Unknown error'), 'error');
    } catch (e) { showNotification('Network error', 'error'); }
    finally { btn.disabled = false; btn.textContent = 'Update Student'; }
}

async function saveStudent() {
    const firstName = document.getElementById('firstName').value.trim();
    const lastName  = document.getElementById('lastName').value.trim();
    if (!firstName || !lastName) return showNotification('First and last name are required', 'error');
    const body = buildBody('');
    try {
        const res = await apiFetch('/api/students', { method: 'POST', body: JSON.stringify(body) });
        const data = await res.json();
        if (data.success) {
            showNotification('Student saved successfully', 'success');
            // If from waiting list, mark enrolled and redirect back
            if (waitlistId) {
                await apiFetch(`/api/waitinglist/${waitlistId}`, {
                    method: 'PUT', body: JSON.stringify({ status: 'Enrolled' })
                });
                sessionStorage.removeItem('enrollFromWaitlist');
                showNotification('Student enrolled and waiting list updated.', 'success');
                waitlistId = null;
                setTimeout(() => window.location.href = 'waitinglist.html', 1500);
                return;
            }
            cancelNew();
            await loadStudents();
        }
        else showNotification('Save failed: ' + (data.error || 'Unknown error'), 'error');
    } catch (e) { showNotification('Network error', 'error'); }
}

function collectBenefits(prefix) {
    const p = prefix || '';
    const b = [];
    if (document.getElementById(p + 'benWIC')?.checked)      b.push('WIC');
    if (document.getElementById(p + 'benMedicaid')?.checked)  b.push('Medicaid');
    if (document.getElementById(p + 'benSNAP')?.checked)      b.push('SNAP');
    if (document.getElementById(p + 'benTANF')?.checked)      b.push('TANF');
    if (document.getElementById(p + 'benCCAP')?.checked)      b.push('CCAP');
    return b.join(', ');
}

function calcDaysOld() {
    const bd = document.getElementById('birthDate').value;
    const el = document.getElementById('daysOld');
    if (!bd) { el.value = ''; return; }
    const diff = Math.floor((Date.now() - new Date(bd).getTime()) / 86400000);
    el.value = diff > 0 ? diff : '';
}

function calcFRP(incomeId, sizeId, outputId, benefitsPrefix) {
    const freeThresholds    = [19578,26572,33566,40560,47554,54548,61542,68536];
    const reducedThresholds = [27861,37814,47767,57720,67673,77626,87579,97532];
    const income = parseInt(document.getElementById(incomeId)?.value) || 100000;
    const hhSize = Math.max(1, Math.min(parseInt(document.getElementById(sizeId)?.value) || 1, 8)) - 1;
    const benefits = collectBenefits(benefitsPrefix);
    let frp = 'Paid';
    if (benefits || income <= freeThresholds[hhSize]) frp = 'Free';
    else if (income <= reducedThresholds[hhSize]) frp = 'Reduced';
    document.getElementById(outputId).value = frp;
}

function buildBody(prefix) {
    return {
        firstName:  document.getElementById(prefix + 'firstName').value.trim(),
        lastName:   document.getElementById(prefix + 'lastName').value.trim(),
        birthDate:  document.getElementById(prefix + 'birthDate').value,
        startDate:  document.getElementById(prefix + 'startDate').value,
        cityTown:   document.getElementById(prefix + 'cityTown').value,
        daysOld:    document.getElementById(prefix + 'daysOld').value,
        roomNumber: document.getElementById(prefix + 'roomNumber').value,
        active:     document.getElementById(prefix + 'active').value,
        category:   document.getElementById(prefix + 'category').value,
        monday:     document.getElementById(prefix + 'monday').checked,
        tuesday:    document.getElementById(prefix + 'tuesday').checked,
        wednesday:  document.getElementById(prefix + 'wednesday').checked,
        thursday:   document.getElementById(prefix + 'thursday').checked,
        friday:     document.getElementById(prefix + 'friday').checked,
        pfaPiNa:    document.getElementById(prefix + 'pfaPiNa').value,
        frpFood:    document.getElementById(prefix + 'frpFood').value,
        iep:        document.getElementById(prefix + 'iep').checked,
        military:   document.getElementById(prefix + 'military').checked,
        householdIncome: document.getElementById(prefix + 'householdIncome') ? document.getElementById(prefix + 'householdIncome').value : '',
        householdSize: document.getElementById(prefix + 'householdSize') ? document.getElementById(prefix + 'householdSize').value : '',
        publicBenefits: collectBenefits(prefix === '' ? '' : prefix),
        proofOfIncome: document.getElementById('proofOfIncome') ? document.getElementById('proofOfIncome').checked : false,
    };
}

// ── ROOM ROSTER ──
let activeRosterRoomNum = 'All';

function buildRoster() {
    // Build sidebar
    const sidebar = document.getElementById('rosterSidebar');
    const sidebarRooms = ['All', ...classrooms.map(r => r.RoomNumber)];
    sidebar.innerHTML = sidebarRooms.map(rn => {
        const cr = rn === 'All' ? null : getClassroom(rn);
        const label = rn === 'All' ? 'All Rooms' : (cr ? cr.Room : rn);
        const isActive = String(activeRosterRoomNum) === String(rn);
        return `<button onclick="selectRosterRoom('${rn}')"
            style="display:block;width:100%;text-align:left;padding:10px 16px;border:none;cursor:pointer;
            background:${isActive?'rgba(255,255,255,0.2)':'transparent'};
            border-left:3px solid ${isActive?'white':'transparent'};
            transition:background 0.15s;"
            onmouseover="if('${rn}'!=='${activeRosterRoomNum}')this.style.background='rgba(255,255,255,0.1)'"
            onmouseout="if('${rn}'!=='${activeRosterRoomNum}')this.style.background='transparent'">
            <div style="font-size:0.82rem;font-weight:700;color:white;">${label}</div>
        </button>`;
    }).join('');

    renderRosterRoom();
}

function selectRosterRoom(rn) {
    activeRosterRoomNum = rn;
    buildRoster();
}

function renderRosterRoom() {
    const rn = activeRosterRoomNum;
    const cr = rn === 'All' ? null : getClassroom(rn);
    document.getElementById('rosterRoomTitle').textContent = rn === 'All' ? 'All Rooms' : (cr ? cr.Room : rn);
    document.getElementById('rosterRoomTeacher').textContent = cr ? cr.TeacherDescription : '';

    const activeOnly = document.getElementById('rosterActiveOnly')?.checked !== false;
    rosterStudents = rn === 'All'
        ? [...students].filter(s => !activeOnly || isTruthy(s.Active)).sort((a, b) => a.Last_Name.localeCompare(b.Last_Name))
        : students.filter(s => String(s.RoomNumber) === String(rn) && (!activeOnly || isTruthy(s.Active)));

    const grid = document.getElementById('rosterStudentGrid');
    if (!rosterStudents.length) {
        grid.innerHTML = '<div style="color:rgba(255,255,255,0.6);font-size:0.88rem;">No students found.</div>';
        return;
    }

    const roomOpts = classrooms.map(r => `<option value="${r.RoomNumber}">${r.Room}</option>`).join('');
    const dayKeys  = ['Monday','Tuesday','Wednesday','Thursday','Friday'];
    const dayLabels = ['Mon','Tue','Wed','Thu','Fri'];
    const payOptions = '<option value="">--</option><option value="Paid">Paid</option><option value="CCAP">CCAP</option><option value="Half Price">Half Price</option><option value="Free">Free</option><option value="Foster">Foster</option>';

    grid.innerHTML = `
        <table style="border-collapse:collapse;font-size:0.78rem;">
            <thead>
                <tr style="border-bottom:2px solid var(--border);">
                    <th style="padding:8px 12px;text-align:left;font-size:0.65rem;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;color:var(--text-muted);min-width:140px;max-width:180px;">Student</th>
                    ${dayLabels.map(d => `<th style="padding:8px 8px;text-align:center;font-size:0.65rem;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;color:var(--text-muted);width:38px;">${d}</th>`).join('')}
                    <th style="padding:8px 6px;font-size:0.65rem;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;color:var(--text-muted);width:52px;">Active</th>
                    <th style="padding:8px 6px;font-size:0.65rem;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;color:var(--text-muted);width:90px;">Pay</th>
                    <th style="padding:8px 6px;font-size:0.65rem;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;color:var(--text-muted);width:52px;">Food</th>
                    <th style="padding:8px 6px;font-size:0.65rem;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;color:var(--text-muted);width:80px;">Program</th>
                    <th style="padding:8px 6px;font-size:0.65rem;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;color:var(--text-muted);width:160px;">Room</th>
                    <th style="padding:8px 6px;text-align:center;font-size:0.65rem;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;color:var(--text-muted);width:44px;">Save</th>
                </tr>
            </thead>
            <tbody>
                ${rosterStudents.map((s, i) => {
                    // Calculate F/R/P for display
                    const _freeT  = [19578,26572,33566,40560,47554,54548,61542,68536];
                    const _redT   = [27861,37814,47767,57720,67673,77626,87579,97532];
                    const _inc    = parseInt(s.HouseholdIncome) || 100000;
                    const _hh     = Math.max(1, Math.min(parseInt(s.HouseholdSize)||1, 8)) - 1;
                    const _ben    = s.PublicBenefits || '';
                    let _frp = 'Paid';
                    if (_ben || _inc <= _freeT[_hh]) _frp = 'Free';
                    else if (_inc <= _redT[_hh]) _frp = 'Reduced';
                    const _frpColor = _frp === 'Free' ? '#16a34a' : _frp === 'Reduced' ? '#d97706' : '#64748b';
                    // Normalize pay type
                    const _cat = (s.Category||'').trim();
                    const _catUp = _cat.toUpperCase();
                    let _norm = _cat;
                    if (_catUp === 'CHASI' || _catUp === 'CCAP') _norm = 'CCAP';
                    else if (_catUp === 'DCFS') _norm = 'Foster';
                    else if (_cat === '1/2 price' || _catUp === 'HALF PRICE') _norm = 'Half Price';
                    else if (_catUp === 'STAFF') _norm = 'Free';
                    else if (_catUp === 'PAID') _norm = 'Paid';
                    else if (_catUp === 'FOSTER') _norm = 'Foster';
                    const dd = (id, opts) => '<select id="'+id+'" onchange="markRosterChanged('+i+')" style="padding:2px 3px;border:1px solid var(--border);border-radius:3px;font-size:0.72rem;color:var(--text);background:white;width:100%;">'+opts+'</select>';
                    const dayChecks = dayKeys.map((k, di) =>
                        `<td style="padding:7px 8px;text-align:center;border-bottom:1px solid var(--border);">
                            <input type="checkbox" id="rDay${i}_${di}" ${isTruthy(s[k])?'checked':''} onchange="markRosterChanged(${i})" style="width:auto;accent-color:var(--primary);">
                        </td>`
                    ).join('');
                    return `<tr id="rosterCard${i}" style="border-bottom:1px solid var(--border);" onmouseover="this.style.background='#f8fafc'" onmouseout="this.style.background='white'">
                        <td style="padding:7px 12px;font-weight:600;color:var(--text);white-space:nowrap;max-width:180px;overflow:hidden;text-overflow:ellipsis;">${s.Last_Name}, ${s.First_Name}</td>
                        ${dayChecks}
                        <td style="padding:5px 6px;">${dd('rosterActive'+i, '<option '+(isTruthy(s.Active)?'selected':'')+' value="Yes">Yes</option><option '+(!isTruthy(s.Active)?'selected':'')+' value="No">No</option>')}</td>
                        <td style="padding:5px 6px;">${dd('rosterPayType'+i, payOptions)}</td>
                        <td style="padding:5px 6px;text-align:center;font-size:0.72rem;font-weight:700;color:${_frpColor};">${_frp}</td>
                        <td style="padding:5px 6px;">${dd('rosterPfaPiNa'+i, '<option value="">--</option><option '+(s.PFA_PI_na==='PFA'?'selected':'')+' value="PFA">PFA</option><option '+(s.PFA_PI_na==='PI'?'selected':'')+' value="PI">PI</option><option '+(s.PFA_PI_na==='INCCRA'?'selected':'')+' value="INCCRA">INCCRA</option>')}</td>
                        <td style="padding:5px 6px;">${dd('rosterRoom'+i, roomOpts)}</td>
                        <td style="padding:5px 6px;text-align:center;">
                            <button id="rosterSave${i}" onclick="saveRosterRow(${i})" disabled
                                style="padding:3px 8px;background:var(--primary);color:white;border:none;border-radius:3px;font-size:0.7rem;font-weight:700;cursor:pointer;opacity:0.3;">Save</button>
                        </td>
                    </tr>`;
                }).join('')}
            </tbody>
            <tfoot>
                <tr style="background:#f8fafc;border-top:2px solid var(--border);">
                    <td style="padding:7px 12px;font-size:0.65rem;font-weight:700;color:var(--primary);text-transform:uppercase;letter-spacing:0.05em;">Daily Total</td>
                    ${dayKeys.map((k, di) => {
                        const total = rosterStudents.filter(s => isTruthy(s[k])).length;
                        return `<td id="dayTotal${di}" style="padding:7px 8px;text-align:center;font-size:0.85rem;font-weight:800;color:var(--primary);">${total}</td>`;
                    }).join('')}
                    <td colspan="6"></td>
                </tr>
            </tfoot>
        </table>`;

    // Set room and pay type dropdowns after render
    rosterStudents.forEach((s, i) => {
        const sel = document.getElementById(`rosterRoom${i}`);
        if (sel) sel.value = s.RoomNumber || '';
        // Normalize and set pay type
        const paySel = document.getElementById(`rosterPayType${i}`);
        if (paySel) {
            const cat = (s.Category||'').trim();
            const catUp = cat.toUpperCase();
            let norm = '';
            if (catUp === 'CHASI' || catUp === 'CCAP') norm = 'CCAP';
            else if (catUp === 'DCFS' || catUp === 'FOSTER') norm = 'Foster';
            else if (cat === '1/2 price' || catUp === 'HALF PRICE') norm = 'Half Price';
            else if (catUp === 'STAFF' || catUp === 'FREE') norm = 'Free';
            else if (catUp === 'PAID') norm = 'Paid';
            else norm = cat;
            paySel.value = norm;
        }
    });}

let rosterIndex = 0;
function showRosterCard() { renderRosterRoom(); }
function rosterNav(dir) {}

function markRosterChanged(i) {
    const btn = document.getElementById(`rosterSave${i}`);
    if (btn) { btn.disabled = false; btn.style.opacity = '1'; }
    // Refresh daily totals
    const dayKeys = ['Monday','Tuesday','Wednesday','Thursday','Friday'];
    dayKeys.forEach((k, di) => {
        let total = 0;
        rosterStudents.forEach((s, si) => {
            const cb = document.getElementById(`rDay${si}_${di}`);
            if (cb) total += cb.checked ? 1 : 0;
            else total += isTruthy(s[k]) ? 1 : 0;
        });
        const cell = document.getElementById(`dayTotal${di}`);
        if (cell) cell.textContent = total;
    });
}

// keep old markChanged alias for compatibility
function markChanged(i) { markRosterChanged(i); }

async function saveRosterRow(i) {
    const s = rosterStudents[i];
    const newRoom    = document.getElementById(`rosterRoom${i}`)?.value || s.RoomNumber || '';
    const newPayType = document.getElementById(`rosterPayType${i}`)?.value || s.Category || '';
    const newPfaPiNa = document.getElementById(`rosterPfaPiNa${i}`)?.value || s.PFA_PI_na || '';
    const newActive  = document.getElementById(`rosterActive${i}`)?.value || s.Active || 'Yes';
    const btn = document.getElementById(`rosterSave${i}`);
    btn.disabled = true; btn.textContent = '…';
    // Auto-calculate F_R_P_Food from income/size/benefits
    const freeThresholds    = [19578,26572,33566,40560,47554,54548,61542,68536];
    const reducedThresholds = [27861,37814,47767,57720,67673,77626,87579,97532];
    const income = parseInt(s.HouseholdIncome) || 100000;
    const hhSize = Math.max(1, Math.min(parseInt(s.HouseholdSize)||1, 8)) - 1;
    const benefits = s.PublicBenefits || '';
    let calcFrpFood = 'Paid';
    if (benefits || income <= freeThresholds[hhSize]) calcFrpFood = 'Free';
    else if (income <= reducedThresholds[hhSize]) calcFrpFood = 'Reduced';
    const body = {
        firstName: s.First_Name, lastName: s.Last_Name,
        birthDate: s.Birth_date, startDate: s.Start_Date,
        cityTown: s.City_Town, daysOld: s.Days_Old,
        roomNumber: newRoom,
        active: newActive, category: newPayType,
        monday:    document.getElementById(`rDay${i}_0`)?.checked || false,
        tuesday:   document.getElementById(`rDay${i}_1`)?.checked || false,
        wednesday: document.getElementById(`rDay${i}_2`)?.checked || false,
        thursday:  document.getElementById(`rDay${i}_3`)?.checked || false,
        friday:    document.getElementById(`rDay${i}_4`)?.checked || false,
        pfaPiNa: newPfaPiNa, frpFood: calcFrpFood,
        iep: isTruthy(s.IEP), military: isTruthy(s.Military),
        householdIncome: s.HouseholdIncome || '',
        householdSize: s.HouseholdSize || '',
        publicBenefits: s.PublicBenefits || '',
    };
    try {
        const res = await apiFetch(`/api/students/${encodeURIComponent(s.First_Name)}/${encodeURIComponent(s.Last_Name)}`, {
            method: 'PUT', body: JSON.stringify(body)
        });
        const data = await res.json();
        if (data.success) {
            rosterStudents[i].RoomNumber = newRoom;
            rosterStudents[i].Category = newPayType;
            rosterStudents[i].PFA_PI_na = newPfaPiNa;
            rosterStudents[i].Active = newActive;
            btn.style.opacity = '0.4';
            showNotification(`${s.First_Name} ${s.Last_Name} updated`, 'success');
        } else {
            showNotification('Update failed: ' + (data.error || ''), 'error');
            btn.disabled = false;
        }
    } catch (e) { showNotification('Network error', 'error'); btn.disabled = false; }
    finally { btn.textContent = 'Save Changes'; }
}

function setMode(mode) {
    currentMode = mode;
    document.getElementById('emsMode').style.display    = mode === 'ems'    ? 'block' : 'none';
    document.getElementById('rosterMode').style.display = mode === 'roster' ? 'block' : 'none';
    document.getElementById('btnEmsMode').classList.toggle('active',    mode === 'ems');
    document.getElementById('btnRosterMode').classList.toggle('active', mode === 'roster');
    if (mode === 'roster') buildRoster();
    if (mode === 'ems') { buildViewSidebar(); updateRoomNavDisplay(); }
}

function showNotification(msg, type = 'info') {
    const el = document.createElement('div');
    el.className = `notification ${type}`;
    el.textContent = msg;
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 3500);
}

init();
